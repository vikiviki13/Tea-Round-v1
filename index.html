<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TeaRound"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0d0d14"/>
<meta name="description" content="Effortless group tea & coffee orders"/>
<link rel="manifest" href="./manifest.json"/>
<title>TeaRound Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden;background:#0d0d14}
input,button,textarea,select{font-family:inherit}
button{cursor:pointer;border:none;background:none}
input,textarea{border:none;outline:none}
img{max-width:100%;display:block}

/* ── CSS VARIABLES / THEMES ───────────────────────────────────────────────── */
:root{
  /* Dark theme (default) */
  --bg:#0d0d14;
  --surface:#141420;
  --surface2:#1a1a2e;
  --border:#ffffff0f;
  --border2:#ffffff18;
  --text:#f0f0ff;
  --text2:#8888aa;
  --text3:#44445a;
  --accent:#00c896;
  --accent-dim:#00c89618;
  --accent-text:#00c896;
  --danger:#ff4466;
  --danger-dim:#ff446618;
  --warn:#f59e0b;
  --shadow:0 8px 40px #00000055;
  --shadow-accent:0 8px 40px #00c89630;
  --nav-bg:#0d0d14ee;
  --radius:16px;
  --radius-lg:24px;
  --radius-xl:32px;
}
[data-theme="light"]{
  --bg:#f5f5f0;--surface:#ffffff;--surface2:#f0f0ea;--border:#e8e8e0;--border2:#d8d8d0;
  --text:#1a1a2e;--text2:#666688;--text3:#aaaacc;--accent:#00a87a;--accent-dim:#00a87a15;
  --accent-text:#007a58;--danger:#e02050;--danger-dim:#e0205015;--warn:#d97706;
  --shadow:0 4px 24px #0000000a;--shadow-accent:0 8px 32px #00a87a25;--nav-bg:#fffffff0;
}
[data-theme="warm"]{
  --bg:#1a1208;--surface:#231a0a;--surface2:#2e2010;--border:#ffffff0a;--border2:#ffffff15;
  --text:#f5e6c8;--text2:#9a7a50;--text3:#5a4030;--accent:#f0a030;--accent-dim:#f0a03018;
  --accent-text:#f0a030;--danger:#e05030;--danger-dim:#e0503018;--warn:#f0a030;
  --shadow:0 8px 40px #00000066;--shadow-accent:0 8px 40px #f0a03030;--nav-bg:#1a1208ee;
}
[data-theme="neon"]{
  --bg:#020208;--surface:#06060f;--surface2:#0a0a18;--border:#00ffcc08;--border2:#00ffcc15;
  --text:#d0d0ff;--text2:#5050aa;--text3:#2a2a5a;--accent:#00ffcc;--accent-dim:#00ffcc10;
  --accent-text:#00ffcc;--danger:#ff0066;--danger-dim:#ff006615;--warn:#ffaa00;
  --shadow:0 8px 60px #00000088;--shadow-accent:0 0 40px #00ffcc20;--nav-bg:#020208f0;
}

/* ── LAYOUT ───────────────────────────────────────────────────────────────── */
#app{
  display:flex;min-height:100vh;background:var(--bg);color:var(--text);
  transition:background .3s,color .3s;
}

/* Sidebar (desktop) */
#sidebar{
  width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:28px 20px;position:fixed;top:0;left:0;bottom:0;
  z-index:100;transition:transform .3s;
}
#sidebar .logo{display:flex;align-items:center;gap:12px;padding:8px 12px;margin-bottom:36px}
#sidebar .logo-icon{width:40px;height:40px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#sidebar .logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.3px}
#sidebar .logo-sub{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.1em}
#sidebar nav{display:flex;flex-direction:column;gap:4px;flex:1}
#sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius);color:var(--text2);font-weight:600;font-size:14px;transition:all .2s;text-decoration:none;background:none;border:none;width:100%;text-align:left;cursor:pointer}
#sidebar .nav-item:hover{background:var(--accent-dim);color:var(--accent)}
#sidebar .nav-item.active{background:var(--accent-dim);color:var(--accent)}
#sidebar .nav-item svg{width:18px;height:18px;flex-shrink:0}
#sidebar .nav-item .nav-badge{margin-left:auto;background:var(--accent);color:#000;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px}
#sidebar .sidebar-footer{padding-top:20px;border-top:1px solid var(--border)}

/* Main content */
#main{margin-left:260px;flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{
  position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);
  padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px);
}
#topbar h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text)}
#content{padding:32px;flex:1}

/* Bottom nav (mobile) */
#bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);
  border-top:1px solid var(--border);backdrop-filter:blur(20px);
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));z-index:100;
  display:none;justify-content:space-around;
}
#bottom-nav .bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border-radius:12px;color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:none;border:none;cursor:pointer;transition:all .2s;min-width:60px}
#bottom-nav .bnav-item svg{width:22px;height:22px}
#bottom-nav .bnav-item.active{color:var(--accent)}

/* Responsive */
@media(max-width:768px){
  #sidebar{display:none}
  #main{margin-left:0}
  #content{padding:20px 16px 90px}
  #topbar{padding:0 16px;height:56px}
  #bottom-nav{display:flex}
  #topbar h1{font-size:17px}
}

/* ── COMPONENTS ───────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.inp{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 16px;color:var(--text);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;
  transition:border-color .2s;
}
.inp:focus{border-color:var(--accent);outline:none}
.inp::placeholder{color:var(--text3)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius);font-weight:700;font-size:14px;font-family:'DM Sans',sans-serif;transition:all .15s;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#0a0a14}
.btn-primary:hover{filter:brightness(1.1)}
.btn-dark{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-dark:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--surface2);color:var(--text2);flex-shrink:0;transition:all .2s;cursor:pointer}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tag-green{background:var(--accent-dim);color:var(--accent-text)}
.tag-red{background:var(--danger-dim);color:var(--danger)}
.tag-muted{background:var(--surface2);color:var(--text2)}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px}
.section-sub{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:20px}
.avatar{border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:16px 0}
.modal-overlay{position:fixed;inset:0;background:#000000aa;backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s}
.modal-sheet{position:fixed;inset:0;background:#000000aa;backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal-box{background:var(--surface);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:440px;box-shadow:var(--shadow);animation:slideUp .25s}
.modal-sheet-box{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:28px 28px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:500px;animation:slideUp .25s;max-height:85vh;overflow-y:auto}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.stack{display:flex;flex-direction:column}
.stack-8{display:flex;flex-direction:column;gap:8px}
.stack-12{display:flex;flex-direction:column;gap:12px}
.stack-20{display:flex;flex-direction:column;gap:20px}
.w-full{width:100%}
.text-accent{color:var(--accent)}
.text-muted{color:var(--text2)}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-lg{font-size:18px}
.font-bold{font-weight:700}.font-black{font-weight:800}
.font-syne{font-family:'Syne',sans-serif}
.upper{text-transform:uppercase;letter-spacing:.08em}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE-SPECIFIC STYLES ─────────────────────────────────────────────────── */
/* Login */
#login-page{min-height:100vh;display:flex;align-items:stretch}
.login-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px;max-width:520px}
.login-right{flex:1;background:var(--surface);border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden}
.login-right-content{text-align:center;position:relative;z-index:1}
.login-deco{position:absolute;width:400px;height:400px;border-radius:50%;background:var(--accent-dim);filter:blur(80px);top:50%;left:50%;transform:translate(-50%,-50%)}
@media(max-width:768px){
  #login-page{flex-direction:column}
  .login-left{padding:40px 28px;max-width:100%}
  .login-right{display:none}
}

/* Dashboard stats */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.stat-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--text);line-height:1}
.stat-label{font-size:12px;color:var(--text2);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.stat-icon{position:absolute;right:20px;top:20px;width:40px;height:40px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent)}

/* Session list */
.session-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s}
.session-row:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.session-icon{width:48px;height:48px;border-radius:14px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}

/* Menu item card */
.menu-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.menu-item:hover{border-color:var(--border2)}
.menu-emoji{width:52px;height:52px;border-radius:14px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}

/* Bill panel */
.bill-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden}
.bill-header{padding:20px 24px;border-bottom:1px solid var(--border)}
.bill-row{padding:12px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.bill-row:last-child{border-bottom:none}
.bill-total{background:var(--accent);padding:18px 24px;display:flex;justify-content:space-between;align-items:center}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius);padding:4px;margin-bottom:24px}
.tab{flex:1;padding:8px 12px;border-radius:calc(var(--radius) - 4px);font-size:13px;font-weight:700;color:var(--text2);transition:all .2s;text-align:center;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}

/* Badge grid */
.badge-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;text-align:center;transition:all .2s}
.badge-card.earned{border-color:var(--accent);background:var(--accent-dim)}
.badge-card:not(.earned){opacity:.45}
.badge-emoji{font-size:28px;margin-bottom:8px}
.badge-name{font-size:12px;font-weight:700;color:var(--text)}

/* Theme picker */
.theme-card{border-radius:var(--radius-lg);padding:16px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative}
.theme-card.active{border-color:var(--accent)}
.theme-dot{width:12px;height:12px;border-radius:50%;display:inline-block}

/* Toast */
#toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
@media(max-width:768px){#toast-container{top:auto;bottom:90px;right:12px;left:12px}}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);animation:fadeInUp .25s;pointer-events:auto}
.toast-success{background:var(--surface);border:1px solid var(--accent);color:var(--text)}
.toast-error{background:var(--surface);border:1px solid var(--danger);color:var(--text)}

/* Qty stepper */
.qty-stepper{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.qty-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--text2);background:none;border:none;cursor:pointer;transition:color .15s}
.qty-btn:hover{color:var(--accent)}
.qty-num{width:28px;text-align:center;font-size:14px;font-weight:800;color:var(--text)}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;border:2px dashed var(--border);border-radius:var(--radius-xl)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px;font-weight:600;color:var(--text3);font-style:italic}

/* Profile hero */
.profile-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;margin-bottom:24px}

/* Desktop session layout */
@media(min-width:769px){
  .session-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Install banner */
#install-banner{display:none;background:var(--accent);color:#0a0a14;padding:12px 20px;font-size:13px;font-weight:700;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
#install-banner.show{display:flex}
#install-banner button{background:rgba(0,0,0,.15);border:none;border-radius:8px;padding:6px 14px;font-weight:800;cursor:pointer;color:#0a0a14;font-size:12px}
#install-banner .close-banner{background:none;margin-left:auto;font-size:18px;line-height:1}

/* Color picker */
.color-swatch{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0}
.color-swatch.active{border-color:var(--text)}

/* Join code input (large) */
.code-input{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;font-size:22px;font-weight:800;font-family:'Syne',sans-serif;color:var(--text);text-transform:uppercase;letter-spacing:.15em;width:100%;text-align:center;transition:border-color .2s}
.code-input:focus{border-color:var(--accent)}

/* Locked/closed banner */
.status-banner{border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:14px}
.status-banner-locked{background:var(--danger-dim);border:1px solid var(--danger);color:var(--danger)}
.status-banner-closed{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}

/* Emoji picker */
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.emoji-btn{padding:8px;border-radius:8px;font-size:16px;background:var(--surface2);border:2px solid transparent;cursor:pointer;transition:all .15s;text-align:center}
.emoji-btn.active{border-color:var(--accent);background:var(--accent-dim)}
@media(max-width:500px){.emoji-grid{grid-template-columns:repeat(6,1fr)}}

/* Navigation label hidden on sm screens when icon only */
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── SUPABASE CONFIG ───────────────────────────────────────────────────────────
// 👉 Replace these two values with your own from Supabase → Settings → API
const SUPABASE_URL     = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

let _db = null;
function getDB(){
  if(!_db && SUPABASE_URL !== 'YOUR_SUPABASE_URL'){
    _db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
  return _db;
}

// ── DB HELPERS (Supabase-backed, falls back to localStorage if not configured) ─
const DB = {
  async loadAll(){
    const db = getDB();
    if(!db) return false; // use localStorage fallback
    try {
      const [users, shops, sessions, orders] = await Promise.all([
        db.from('users').select('*'),
        db.from('shops').select('*'),
        db.from('sessions').select('*'),
        db.from('orders').select('*'),
      ]);
      state.users    = (users.data||[]).map(u=>({id:u.id,username:u.username,password:u.password,role:u.role,joined:u.joined,avatarColor:u.avatar_color,bio:u.bio,theme:u.theme}));
      state.shops    = (shops.data||[]).map(s=>({id:s.id,name:s.name,address:s.address,creatorId:s.creator_id,menu:s.menu||[]}));
      state.sessions = (sessions.data||[]).map(s=>({id:s.id,shopId:s.shop_id,creatorId:s.creator_id,location:s.location,locked:s.locked,closed:s.closed}));
      state.orders   = (orders.data||[]).map(o=>({id:o.id,sessionId:o.session_id,userId:o.user_id,userName:o.user_name,itemId:o.item_id,itemName:o.item_name,price:o.price,quantity:o.quantity,note:o.note}));
      return true;
    } catch(e){ console.warn('Supabase load failed, using localStorage', e); return false; }
  },

  async upsertUser(u){
    const db=getDB(); if(!db) return;
    await db.from('users').upsert({id:u.id,username:u.username,password:u.password,role:u.role,joined:u.joined,avatar_color:u.avatarColor,bio:u.bio||'',theme:u.theme||'dark'});
  },
  async upsertShop(s){
    const db=getDB(); if(!db) return;
    await db.from('shops').upsert({id:s.id,name:s.name,address:s.address,creator_id:s.creatorId,menu:s.menu});
  },
  async deleteShop(id){
    const db=getDB(); if(!db) return;
    await db.from('shops').delete().eq('id',id);
  },
  async upsertSession(s){
    const db=getDB(); if(!db) return;
    await db.from('sessions').upsert({id:s.id,shop_id:s.shopId,creator_id:s.creatorId,location:s.location,locked:s.locked||false,closed:s.closed||false});
  },
  async upsertOrder(o){
    const db=getDB(); if(!db) return;

function loadFromLocalStorage(){
  const g=(k,fb)=>{try{return JSON.parse(localStorage.getItem(k)||fb)}catch{return JSON.parse(fb)}};
  state.shops=g(SK.SHOPS,'[]');
  state.sessions=g(SK.SESSIONS,'[]');
  state.orders=g(SK.ORDERS,'[]');
  state.users=g(SK.USERS,'[]');
}
async function load(){
  const g=(k,fb)=>{try{return JSON.parse(localStorage.getItem(k)||fb)}catch{return JSON.parse(fb)}};
  state.theme=localStorage.getItem(SK.THEME)||'dark';
  const auth=g(SK.AUTH,'null');
  if(auth){state.user=auth;state.view='home';}
  applyTheme(state.theme);
  render(); // render immediately with localStorage data
  const usedDB = await DB.loadAll();
  if(!usedDB){ loadFromLocalStorage(); }
  else { localStorage.setItem(SK.AUTH,JSON.stringify(state.user)); } // keep auth in localStorage
  render(); // re-render with DB data
}
function save(){
  // Always persist auth + theme locally; data synced to DB per-operation
  localStorage.setItem(SK.AUTH,JSON.stringify(state.user));
  localStorage.setItem(SK.THEME,state.theme);
  // localStorage mirror (offline fallback)
  localStorage.setItem(SK.SHOPS,JSON.stringify(state.shops));
  localStorage.setItem(SK.SESSIONS,JSON.stringify(state.sessions));
  localStorage.setItem(SK.ORDERS,JSON.stringify(state.orders));
  localStorage.setItem(SK.USERS,JSON.stringify(state.users));
}
function setState(patch){
  Object.assign(state,patch);
  save();
  render();
}

// ── THEME ────────────────────────────────────────────────────────────────────
function applyTheme(name){
  const t=THEMES[name]||THEMES.dark;
  document.documentElement.setAttribute('data-theme',name==='dark'?'':name);
  const r=document.documentElement.style;
  Object.entries(t).forEach(([k,v])=>{
    if(!['name'].includes(k))r.setProperty('--'+k,v);
  });
  // special: dark sets no data-theme attr since css default is dark
  if(name==='dark'){document.documentElement.removeAttribute('data-theme');}
  else{document.documentElement.setAttribute('data-theme',name);}
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.innerHTML=`<span>${type==='success'?'✓':'✕'}</span>${msg}`;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},2500);
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function handleAuth(username,password,isReg){
  if(!username.trim()||!password.trim()){toast('Fill all fields','error');return;}
  if(isReg){
    if(state.users.find(u=>u.username===username)){toast('Username taken','error');return;}
    const nu={id:gid(),username:username.trim(),password,role:state.users.length===0?'admin':'user',
      joined:new Date().toLocaleDateString(),avatarColor:AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)],bio:'',theme:'dark'};
    state.users.push(nu);state.user=nu;
    DB.upsertUser(nu); // sync to Supabase
    toast('Account created! Welcome 🎉');
  } else {
    const found=state.users.find(u=>u.username===username&&u.password===password);
    if(!found){toast('Incorrect credentials','error');return;}
    state.user=found;
    if(found.theme)setState({theme:found.theme});
    toast(`Welcome back, ${found.username}!`);
  }
  setState({view:'home'});
}

function updateUser(patch){
  Object.assign(state.user,patch);
  state.users=state.users.map(u=>u.id===state.user.id?{...u,...patch}:u);
}

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportShop(shop){
  const data=JSON.stringify({name:shop.name,address:shop.address,menu:shop.menu.map(({name,price,emoji})=>({name,price,emoji}))},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`TeaRound_${shop.name.replace(/\s+/g,'_')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  navigator.clipboard.writeText(data).catch(()=>{});
  toast(`${shop.name} exported!`);
}

function importShop(json){
  try{
    const data=JSON.parse(json);
    if(!data.name||!Array.isArray(data.menu))throw new Error();
    const s={id:gid(),name:data.name,address:data.address||'Imported',menu:data.menu.map(m=>({...m,id:gid()})),creatorId:state.user.id};
    state.shops.push(s);setState({modal:null});
    toast(`Imported ${s.name}!`);
  }catch{toast('Invalid JSON format','error');}
}

function downloadSummary(){
  const session=getSession(),shop=getSessionShop(),so=getSessionOrders();
  const agg=Object.entries(so.reduce((a,o)=>{a[o.itemName]=(a[o.itemName]||0)+o.quantity;return a},{}));
  const total=so.reduce((a,o)=>a+o.price*o.quantity,0);
  let c=`TEA ROUND SUMMARY\nID: ${session?.id}\nShop: ${shop?.name}\nLocation: ${session?.location}\nDate: ${new Date().toLocaleString()}\n${'─'.repeat(32)}\n\nGROUP TOTALS:\n`;
  agg.forEach(([n,q])=>{c+=`  • ${n}: ×${q}\n`;});
  c+=`\nBILL: ₹${total}\n\nINDIVIDUAL ORDERS:\n`;
  so.forEach(o=>{c+=`  • ${o.userName}: ${o.itemName} ×${o.quantity} = ₹${o.price*o.quantity}\n`;});
  const blob=new Blob([c],{type:'text/plain'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`TeaRound_${state.activeSessionId}.txt`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Summary downloaded!');
}

function addMenuItem(shopId){
  const name=document.getElementById('item-name')?.value?.trim();
  const price=document.getElementById('item-price')?.value;
  if(!name){toast('Enter item name','error');return;}
  const emoji=state._menuEmoji||'🍵';
  state.shops=state.shops.map(s=>s.id===shopId?{...s,menu:[...s.menu,{id:gid(),name,price:parseFloat(price)||0,emoji}]}:s);
  const updatedShop=state.shops.find(s=>s.id===shopId);
  DB.upsertShop(updatedShop);
  setState({_menuEmoji:emoji});toast('Item added!');
}
function removeMenuItem(shopId,itemId){
  state.shops=state.shops.map(s=>s.id===shopId?{...s,menu:s.menu.filter(m=>m.id!==itemId)}:s);
  const updatedShop=state.shops.find(s=>s.id===shopId);
  DB.upsertShop(updatedShop);
  setState({});toast('Item removed');
}

function createSession(){
  const shopId=document.getElementById('session-shop')?.value;
  const loc=document.getElementById('session-loc')?.value?.trim()||'Office';
  if(!shopId){toast('Select a shop','error');return;}
  const id=`ROUND-${gid()}`;

  setState({activeSessionId:id,view:'session',_newSessionShop:'',_newSessionLoc:''});
  toast('Round started!');

      </div>
    </div>
  </div>`;
}

function toggleLock(id){
  state.sessions=state.sessions.map(s=>s.id===id?{...s,locked:!s.locked}:s);
  const updated=state.sessions.find(s=>s.id===id);
  DB.upsertSession(updated);
  setState({});toast(updated?.locked?'Round locked':'Round unlocked');
}
function closeRound(id){
  confirmDelete('Close this round? Orders will be frozen.',()=>{
    state.sessions=state.sessions.map(s=>s.id===id?{...s,closed:true,locked:true}:s);
    const updated=state.sessions.find(s=>s.id===id);
    DB.upsertSession(updated);
    setState({});toast('Round closed');
  });
}
function removeOrder(id){
  DB.deleteOrder(id);
  state.orders=state.orders.filter(o=>o.id!==id);setState({});toast('Order removed');
}
function changeQty(itemId,delta){
  const q=state._orderQty||{};
  q[itemId]=Math.max(1,(q[itemId]||1)+delta);
  state._orderQty=q;
  const el=document.getElementById(`qty-${itemId}`);
  if(el)el.textContent=q[itemId];
}
function addOrder(sessionId,itemId,itemName,price){
  const qty=(state._orderQty||{})[itemId]||1;
  const order={id:gid(),sessionId,userId:state.user.id,userName:state.user.username,itemId,itemName,price:parseFloat(price)||0,quantity:qty,note:''};
  state.orders.push(order);
  DB.upsertOrder(order);
  const q=state._orderQty||{};q[itemId]=1;state._orderQty=q;
  setState({});toast(`${itemName} added!`);
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
function renderProfile(){
  const tab=state._profileTab||'overview';
  const u=state.user;
  const userOrders=state.orders.filter(o=>o.userId===u?.id);
  const totalSpent=userOrders.reduce((a,o)=>a+o.price*o.quantity,0);
  const stats={totalOrders:userOrders.length,roundsHosted:state.sessions.filter(s=>s.creatorId===u?.id).length,shopsCreated:state.shops.filter(s=>s.creatorId===u?.id).length,totalSpent};
  const earnedBadges=BADGES.filter(b=>b.cond(stats));

  const favItems=Object.entries(userOrders.reduce((a,o)=>{a[o.itemName]=(a[o.itemName]||0)+o.quantity;return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,4);

  return `
  ${renderTopbar('Profile')}
  <div id="content">
    <!-- Hero -->
    <div class="profile-hero">
      <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px">
        ${avatarHtml(u,72,18)}
        <div style="flex:1">
          ${state._editProfile?`
            <div class="stack-8">
              <input id="edit-username" class="inp" value="${u.username}" placeholder="Username" style="padding:9px 14px"/>
              <div style="position:relative">
                <input id="edit-pass" class="inp" type="${state._showEditPass?'text':'password'}" placeholder="New password (blank = keep)" style="padding:9px 14px;padding-right:42px"/>
                <button onclick="setState({_showEditPass:!state._showEditPass})" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);display:flex">${svgIcon(state._showEditPass?'eye_off':'eye',15)}</button>
              </div>
              <input id="edit-bio" class="inp" value="${u.bio||''}" placeholder="Bio (optional)" style="padding:9px 14px"/>
              <div class="flex gap-8">
                <button class="btn btn-primary" style="flex:1;padding:9px" onclick="saveProfile()">${svgIcon('check',16)} Save</button>
                <button class="btn btn-dark" style="flex:1;padding:9px" onclick="setState({_editProfile:false})">${svgIcon('x',16)} Cancel</button>
              </div>
            </div>
          `:`
            <div class="flex-between">
              <div>
                <div class="font-syne font-black" style="font-size:22px;color:var(--text)">${u.username}</div>
                <div class="flex gap-8" style="margin-top:4px">
                  <span class="tag ${u.role==='admin'?'tag-green':'tag-muted'}">${u.role==='admin'?'👑 Admin':'👤 Member'}</span>
                  <span class="text-xs text-muted">Since ${u.joined||'?'}</span>
                </div>
                ${u.bio?`<div class="text-muted" style="font-size:13px;margin-top:6px">${u.bio}</div>`:''}
              </div>
              <button class="btn-icon" onclick="setState({_editProfile:true})">${svgIcon('edit',16)}</button>
            </div>
          `}
        </div>
      </div>

      <!-- Avatar colors (always visible when editing) -->
      ${state._editProfile?`
        <div style="margin-bottom:16px">
          <div class="text-xs upper font-bold text-muted" style="margin-bottom:8px">Avatar Color</div>
          <div class="flex gap-8" style="flex-wrap:wrap">
            ${AVATAR_COLORS.map(c=>`<button class="color-swatch ${u.avatarColor===c?'active':''}" style="background:${c}" onclick="updateAvatarColor('${c}')"></button>`).join('')}
          </div>
        </div>
      `:''}

      <!-- Stats -->
      <div class="grid-3">
        ${[{v:stats.totalOrders,l:'Orders'},{v:stats.roundsHosted,l:'Hosted'},{v:`₹${stats.totalSpent}`,l:'Spent'}].map(i=>`
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center">
            <div class="font-syne font-black" style="font-size:22px;color:var(--text)">${i.v}</div>
            <div class="text-xs text-muted upper" style="margin-top:2px">${i.l}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      ${[{id:'overview',icon:'bar_chart',l:'Overview'},{id:'history',icon:'clock',l:'History'},{id:'settings',icon:'palette',l:'Settings'}].map(t=>`
        <button class="tab ${tab===t.id?'active':''}" onclick="setState({_profileTab:'${t.id}'})">${t.l}</button>
      `).join('')}
    </div>

    <!-- Overview -->
    ${tab==='overview'?`
      <div class="section-title" style="margin-bottom:8px">Badges</div>
      <div class="section-sub">${earnedBadges.length} / ${BADGES.length} unlocked</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px">
        ${BADGES.map(b=>{const e=b.cond(stats);return`
          <div class="badge-card ${e?'earned':''}">
            <div class="badge-emoji">${b.icon}</div>
            <div class="badge-name">${b.label}</div>
            ${!e?`<div class="text-xs text-muted" style="margin-top:2px">Locked</div>`:''}
          </div>
        `;}).join('')}
      </div>

      ${favItems.length>0?`
        <div class="section-title" style="margin-bottom:8px">Favourites</div>
        <div class="section-sub">Your most ordered items</div>
        <div class="stack-8">
          ${favItems.map(([name,count])=>`
            <div class="card-sm" style="padding:13px 18px;display:flex;justify-content:space-between;align-items:center">
              <span class="font-bold" style="color:var(--text)">${name}</span>
              <span class="tag tag-green">×${count}</span>
            </div>
          `).join('')}
        </div>
      `:''}
    `:''}

    <!-- History -->
    ${tab==='history'?`
      <div class="section-title" style="margin-bottom:8px">Order History</div>
      <div class="section-sub">${userOrders.length} orders placed</div>
      <div class="stack-8">
        ${userOrders.length===0?`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No orders yet.</div></div>`
        :[...userOrders].reverse().map(o=>{
          const sess=state.sessions.find(s=>s.id===o.sessionId);
          const shop=state.shops.find(sh=>sh.id===sess?.shopId);
          return`<div class="card-sm" style="padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div class="tag tag-green" style="margin-bottom:3px">${o.sessionId}</div>
              <div class="font-bold" style="font-size:14px;color:var(--text)">${o.itemName} ×${o.quantity}</div>
              <div class="text-xs text-muted">${shop?.name||'Unknown shop'}</div>
            </div>
            <div class="font-black" style="color:var(--text2)">₹${o.price*o.quantity}</div>
          </div>`;
        }).join('')}
      </div>
    `:''}

    <!-- Settings -->
    ${tab==='settings'?`
      <div class="section-title" style="margin-bottom:8px">App Theme</div>
      <div class="section-sub">Choose your vibe</div>
      <div class="grid-2" style="margin-bottom:28px">
        ${Object.entries(THEMES).map(([key,t])=>`
          <div class="theme-card ${state.theme===key?'active':''}" style="background:${t.surface};border:2px solid ${state.theme===key?t.accent:t.border}" onclick="setTheme('${key}')">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <span style="font-size:18px">${{dark:'🌙',light:'☀️',warm:'🔥',neon:'⚡'}[key]}</span>
              ${state.theme===key?`<span style="color:${t.accent};font-size:10px;font-weight:800">ACTIVE</span>`:''}
            </div>
            <div style="font-weight:800;font-size:14px;color:${t.text}">${t.name}</div>
            <div style="display:flex;gap:6px;margin-top:8px">
              ${[t.accent,t.text,t['text2']].map(c=>`<div style="width:12px;height:12px;border-radius:50%;background:${c}"></div>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>

      <div class="section-title" style="margin-bottom:12px">Account</div>
      <div class="card" style="overflow:hidden;padding:0">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span class="font-bold" style="color:var(--text)">Role</span>
          <span class="tag ${u?.role==='admin'?'tag-green':'tag-muted'}">${u?.role}</span>
        </div>
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span class="font-bold" style="color:var(--text)">Member since</span>
          <span class="text-muted text-sm">${u?.joined||'—'}</span>
        </div>
        <button onclick="handleLogout()" style="width:100%;padding:16px 20px;display:flex;align-items:center;gap:10px;color:var(--danger);font-weight:800;font-size:14px;font-family:'DM Sans',sans-serif;background:none;border:none;cursor:pointer;text-align:left">
          ${svgIcon('logout',18)} Sign Out
        </button>
      </div>
    `:''}
  </div>`;
}

function saveProfile(){
  const username=document.getElementById('edit-username')?.value?.trim();
  const bio=document.getElementById('edit-bio')?.value?.trim()||'';
  const pass=document.getElementById('edit-pass')?.value;
  if(!username){toast('Username cannot be empty','error');return;}
  if(state.users.find(u=>u.username===username&&u.id!==state.user.id)){toast('Username taken','error');return;}
  const patch={username,bio};if(pass)patch.password=pass;
  updateUser(patch);
  DB.upsertUser({...state.user,...patch});
  setState({_editProfile:false});toast('Profile updated!');
}
function updateAvatarColor(c){updateUser({avatarColor:c});DB.upsertUser({...state.user,avatarColor:c});setState({});}
function setTheme(name){updateUser({theme:name});DB.upsertUser({...state.user,theme:name});setState({theme:name});applyTheme(name);toast(`Theme: ${THEMES[name].name}`);}

// ── MODALS ────────────────────────────────────────────────────────────────────
function renderModals(){
  if(!state.modal)return'';
  const {type,data}=state.modal;

  if(type==='import'){
    return`<div class="modal-overlay" onclick="if(event.target===this)setState({modal:null})">
      <div class="modal-box">
        <div style="width:48px;height:48px;background:var(--accent-dim);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:18px">
          ${svgIcon('file_code',22,'style="color:var(--accent)"')}
        </div>
        <div class="font-syne font-black" style="font-size:20px;color:var(--text);margin-bottom:6px">Import Outlet</div>
        <div class="text-muted text-sm" style="margin-bottom:18px">Paste the JSON config shared by a colleague.</div>
        <textarea id="import-json" class="inp" style="height:120px;resize:none;font-family:monospace;font-size:12px;display:block;width:100%;margin-bottom:16px" placeholder='{ "name": "Café X", "menu": [...] }'></textarea>
        <div class="flex gap-10">
          <button class="btn btn-dark" style="flex:1" onclick="setState({modal:null})">Cancel</button>
          <button class="btn btn-primary" style="flex:1" onclick="importShop(document.getElementById('import-json').value)">Import</button>
        </div>
      </div>
    </div>`;
  }

  if(type==='share'){
    const id=state.activeSessionId||'';
    return`<div class="modal-sheet" onclick="if(event.target===this)setState({modal:null})">
      <div class="modal-sheet-box">
        <div class="font-syne font-black" style="font-size:24px;color:var(--text);margin-bottom:6px">Invite Teammates</div>
        <div class="text-muted text-sm" style="margin-bottom:24px">Share this code so colleagues can join the round</div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <span class="font-syne font-black text-accent" style="font-size:22px;letter-spacing:.08em">${id}</span>
          <button class="btn-icon" onclick="navigator.clipboard.writeText('${id}');toast('Code copied!')">${svgIcon('copy',18)}</button>
        </div>
        <button class="btn btn-primary w-full" onclick="setState({modal:null})">Done</button>
      </div>
    </div>`;
  }

  if(type==='split'){
    const so=getSessionOrders();
    const byUser=so.reduce((a,o)=>{if(!a[o.userId])a[o.userId]={name:o.userName,total:0,items:[]};a[o.userId].total+=o.price*o.quantity;a[o.userId].items.push(`${o.itemName}×${o.quantity}`);return a},{});
    const users=Object.values(byUser);
    const total=so.reduce((a,o)=>a+o.price*o.quantity,0);
    return`<div class="modal-sheet" onclick="if(event.target===this)setState({modal:null})">
      <div class="modal-sheet-box">
        <div class="font-syne font-black" style="font-size:24px;color:var(--text);margin-bottom:6px">Bill Split</div>
        <div class="text-muted text-sm" style="margin-bottom:20px">₹${total} split among ${users.length} person${users.length!==1?'s':''}</div>
        <div class="stack-8" style="margin-bottom:18px">
          ${users.length===0?`<div class="empty-state"><div class="empty-text">No orders to split.</div></div>`
          :users.map(u=>`
            <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
              <div>
                <div class="font-bold" style="color:var(--text)">${u.name}</div>
                <div class="text-xs text-muted">${u.items.join(', ')}</div>
              </div>
              <div class="font-black text-accent" style="font-size:18px">₹${u.total}</div>
            </div>
          `).join('')}
        </div>
        ${users.length>0?`
          <div style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
            <span class="font-bold" style="color:var(--accent-text)">Even split</span>
            <span class="font-black text-accent" style="font-size:20px">₹${Math.ceil(total/users.length)}</span>
          </div>
        `:''}
        <button class="btn btn-primary w-full" onclick="setState({modal:null})">Done</button>
      </div>
    </div>`;
  }

  if(type==='theme'){
    return`<div class="modal-overlay" onclick="if(event.target===this)setState({modal:null})">
      <div class="modal-box">
        <div class="font-syne font-black" style="font-size:20px;color:var(--text);margin-bottom:18px">Choose Theme</div>
        <div class="grid-2" style="margin-bottom:18px">
          ${Object.entries(THEMES).map(([key,t])=>`
            <div class="theme-card ${state.theme===key?'active':''}" style="background:${t.surface};border:2px solid ${state.theme===key?t.accent:t.border};cursor:pointer" onclick="setTheme('${key}');setState({modal:null})">
              <div style="font-size:20px;margin-bottom:8px">${{dark:'🌙',light:'☀️',warm:'🔥',neon:'⚡'}[key]}</div>
              <div style="font-weight:800;font-size:14px;color:${t.text}">${t.name}</div>
            </div>
          `).join('')}
        </div>
        <button class="btn btn-dark w-full" onclick="setState({modal:null})">Close</button>
      </div>
    </div>`;
  }

  if(type==='confirm'){
    return`<div class="modal-overlay">
      <div class="modal-box" style="text-align:center;max-width:360px">
        <div style="font-size:40px;margin-bottom:14px">⚠️</div>
        <div class="font-syne font-black" style="font-size:18px;color:var(--text);margin-bottom:8px">Confirm</div>
        <div class="text-muted text-sm" style="margin-bottom:22px">${data?.msg||''}</div>
        <div class="flex gap-10">
          <button class="btn btn-dark" style="flex:1" onclick="setState({modal:null})">Cancel</button>
          <button class="btn btn-danger" style="flex:1" onclick="state._confirmCb&&state._confirmCb();setState({modal:null,_confirmCb:null})">Confirm</button>
        </div>
      </div>
    </div>`;
  }
  return'';
}

function confirmDelete(msg,cb){
  state._confirmCb=cb;setState({modal:{type:'confirm',data:{msg}}});
}

// ── INSTALL BANNER ────────────────────────────────────────────────────────────
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredInstall=e;
  const banner=document.getElementById('install-banner');
  if(banner)banner.classList.add('show');
});

function installApp(){
  if(!deferredInstall)return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(()=>{deferredInstall=null;});
  const banner=document.getElementById('install-banner');
  if(banner)banner.classList.remove('show');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  applyTheme(state.theme);
  const app=document.getElementById('app');

  if(!state.user){
    app.innerHTML=renderLogin();
    document.getElementById('auth-name')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-pass')?.focus();});
    document.getElementById('auth-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')submitAuth(state._loginReg||false);});
    return;
  }

  let pageHtml='';
  const v=state.view;
  if(v==='home')pageHtml=renderHome();
  else if(v==='manage-shops')pageHtml=renderShops();
  else if(v==='edit-menu')pageHtml=renderEditMenu();
  else if(v==='create-session')pageHtml=renderCreateSession();
  else if(v==='session')pageHtml=renderSession();
  else if(v==='profile')pageHtml=renderProfile();

  app.innerHTML=`
    <div id="install-banner" class="${deferredInstall?'show':''}">
      ☕ Install TeaRound as an app for the best experience!
      <button onclick="installApp()">Install</button>
      <button class="close-banner" onclick="this.parentElement.classList.remove('show')">×</button>
    </div>
    ${renderNav()}
    <div id="main">${pageHtml}</div>
    ${renderModals()}
  `;

  // Re-attach event listeners that can't be inlined
  document.getElementById('auth-name')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-pass')?.focus();});
  document.getElementById('auth-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')submitAuth(state._loginReg||false);});
  document.getElementById('join-code')?.addEventListener('keydown',e=>{if(e.key==='Enter')quickJoin();});
  document.getElementById('session-shop')?.addEventListener('change',function(){
    const shop=state.shops.find(s=>s.id===this.value);
    state._newSessionShop=this.value;
    state._newSessionLoc=shop?.address||'';
    const locEl=document.getElementById('session-loc');
    if(locEl)locEl.value=state._newSessionLoc;
  });
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
load(); // async — renders twice (localStorage first, then DB)

// Service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
