<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TeaRound" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d0d14" />
  <meta name="description" content="Effortless group tea & coffee orders" />
  <link rel="manifest" href="./manifest.json" />
  <!-- PWA icons generated inline as fallback -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%2300c896'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='300' fill='%230a0a14'%3E☕%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%2300c896'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='300' fill='%230a0a14'%3E☕%3C/text%3E%3C/svg%3E" />
  <title>TeaRound Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&display=swap"
    rel="stylesheet" />
  <style>
    /* ── RESET & BASE ─────────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      max-width: 100%
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      overflow-x: hidden
    }

    body {
      height: 100%;
      font-family: 'Outfit', system-ui, sans-serif;
      overflow-x: hidden;
      background: #0d0d14;
      -webkit-font-smoothing: antialiased
    }

    input,
    button,
    textarea,
    select {
      font-family: inherit
    }

    button {
      cursor: pointer;
      border: none;
      background: none
    }

    input,
    textarea {
      border: none;
      outline: none
    }

    img {
      max-width: 100%;
      display: block
    }

    /* ── CSS VARIABLES / THEMES ───────────────────────────────────────────────── */
    :root {
      --bg: #0d0d14;
      --surface: #141420;
      --surface2: #1a1a2e;
      --border: #ffffff0f;
      --border2: #ffffff18;
      --text: #f0f0ff;
      --text2: #8888aa;
      --text3: #44445a;
      --accent: #00c896;
      --accent-dim: #00c89618;
      --accent-text: #00c896;
      --danger: #ff4466;
      --danger-dim: #ff446618;
      --warn: #f59e0b;
      --shadow: 0 4px 24px #00000055;
      --shadow-md: 0 8px 40px #00000055;
      --shadow-accent: 0 8px 40px #00c89630;
      --nav-bg: #0d0d14ee;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --sidebar-w: 256px;
      --topbar-h: 64px;
      --bnav-h: 64px;
    }

    [data-theme="light"] {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --surface2: #f0f0ea;
      --border: #e2e2da;
      --border2: #d0d0c8;
      --text: #1a1a2e;
      --text2: #55557a;
      --text3: #aaaacc;
      --accent: #00a87a;
      --accent-dim: #00a87a15;
      --accent-text: #007a58;
      --danger: #e02050;
      --danger-dim: #e0205015;
      --warn: #d97706;
      --shadow: 0 2px 12px #0000000d;
      --shadow-md: 0 4px 24px #0000000a;
      --shadow-accent: 0 8px 32px #00a87a25;
      --nav-bg: #fffffff0;
    }

    [data-theme="warm"] {
      --bg: #1a1208;
      --surface: #231a0a;
      --surface2: #2e2010;
      --border: #ffffff0a;
      --border2: #ffffff15;
      --text: #f5e6c8;
      --text2: #9a7a50;
      --text3: #5a4030;
      --accent: #f0a030;
      --accent-dim: #f0a03018;
      --accent-text: #f0a030;
      --danger: #e05030;
      --danger-dim: #e0503018;
      --warn: #f0a030;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #f0a03030;
      --nav-bg: #1a1208ee;
    }

    [data-theme="neon"] {
      --bg: #020208;
      --surface: #06060f;
      --surface2: #0a0a18;
      --border: #00ffcc08;
      --border2: #00ffcc15;
      --text: #d0d0ff;
      --text2: #5050aa;
      --text3: #2a2a5a;
      --accent: #00ffcc;
      --accent-dim: #00ffcc10;
      --accent-text: #00ffcc;
      --danger: #ff0066;
      --danger-dim: #ff006615;
      --warn: #ffaa00;
      --shadow: 0 8px 60px #00000088;
      --shadow-md: 0 8px 60px #00000088;
      --shadow-accent: 0 0 40px #00ffcc20;
      --nav-bg: #020208f0;
    }

    [data-theme="ocean"] {
      --bg: #040d1a;
      --surface: #071428;
      --surface2: #0c1e38;
      --border: #1e4a7808;
      --border2: #1e4a7818;
      --text: #c8e4ff;
      --text2: #5880a8;
      --text3: #2a4060;
      --accent: #38b2ff;
      --accent-dim: #38b2ff18;
      --accent-text: #38b2ff;
      --danger: #ff5a7a;
      --danger-dim: #ff5a7a18;
      --warn: #ffa040;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #38b2ff25;
      --nav-bg: #040d1aee;
    }

    [data-theme="rose"] {
      --bg: #120810;
      --surface: #1c0e18;
      --surface2: #261422;
      --border: #ff4a8808;
      --border2: #ff4a8818;
      --text: #ffd6ee;
      --text2: #a06080;
      --text3: #603050;
      --accent: #ff6eb4;
      --accent-dim: #ff6eb418;
      --accent-text: #ff6eb4;
      --danger: #ff4040;
      --danger-dim: #ff404018;
      --warn: #ffaa40;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #ff6eb430;
      --nav-bg: #120810ee;
    }

    [data-theme="forest"] {
      --bg: #080e08;
      --surface: #0e160e;
      --surface2: #141e14;
      --border: #2a5a2a08;
      --border2: #2a5a2a18;
      --text: #d0ead0;
      --text2: #5a8a5a;
      --text3: #2a4a2a;
      --accent: #4dbb6d;
      --accent-dim: #4dbb6d18;
      --accent-text: #4dbb6d;
      --danger: #e05050;
      --danger-dim: #e0505018;
      --warn: #d4a030;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #4dbb6d30;
      --nav-bg: #080e08ee;
    }

    /* ── APP SHELL ────────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      overflow-x: hidden;
      width: 100%;
    }

    /* ── SIDEBAR (desktop ≥1024px) ────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
    }

    #sidebar .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      margin-bottom: 32px
    }

    #sidebar .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    #sidebar .logo-text {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.3px
    }

    #sidebar .logo-sub {
      font-size: 10px;
      color: var(--text2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em
    }

    #sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1
    }

    #sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 14px;
      border-radius: 12px;
      color: var(--text2);
      font-weight: 600;
      font-size: 14px;
      transition: all .2s ease;
      text-decoration: none;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    #sidebar .nav-item:hover {
      background: var(--accent-dim);
      color: var(--accent);
      transform: translateX(2px)
    }

    #sidebar .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent)
    }

    #sidebar .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: .8;
      transition: all .2s ease
    }

    #sidebar .nav-item.active svg {
      opacity: 1;
      filter: drop-shadow(0 0 4px var(--accent))
    }

    #sidebar .nav-item:hover svg {
      opacity: 1
    }

    #sidebar .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 20px
    }

    #sidebar .sidebar-footer {
      padding-top: 16px;
      border-top: 1px solid var(--border)
    }

    /* ── MAIN CONTENT ─────────────────────────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: calc(100vw - var(--sidebar-w));
    }

    #topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: box-shadow .2s ease;
    }

    #topbar:has(+#main *:hover) {
      box-shadow: 0 1px 0 var(--border2)
    }

    #topbar h1 {
      font-family: 'Fraunces', serif;
      font-size: 19px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.2px
    }

    /* Content area with safe max-width */
    #content {
      padding: 24px 28px;
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* ── BOTTOM NAV (mobile <768px) ───────────────────────────────────────────── */
    #bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--nav-bg);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 8px 4px calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
      justify-content: space-around;
      height: calc(var(--bnav-h) + env(safe-area-inset-bottom, 0px));
    }

    #bottom-nav .bnav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 12px;
      border-radius: 12px;
      color: var(--text3);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: none;
      border: none;
      cursor: pointer;
      transition: all .2s ease;
      min-width: 56px;
    }

    #bottom-nav .bnav-item svg {
      width: 22px;
      height: 22px;
      transition: all .2s ease
    }

    #bottom-nav .bnav-item:hover {
      color: var(--text2);
      background: var(--surface2)
    }

    #bottom-nav .bnav-item.active {
      color: var(--accent);
      transform: scale(1.1) translateY(-1px);
      background: var(--accent-dim);
    }

    #bottom-nav .bnav-item.active svg {
      filter: drop-shadow(0 0 8px var(--accent));
      transform: scale(1.05);
    }

    #bottom-nav .bnav-item:active {
      transform: scale(.93)
    }

    /* ── BREAKPOINTS ──────────────────────────────────────────────────────────── */
    /* Tablet: 768–1023px — hide sidebar, show bottom nav, but keep content padded */
    @media(max-width:1023px) {
      #sidebar {
        display: none
      }

      #main {
        margin-left: 0;
        max-width: 100vw;
      }

      #bottom-nav {
        display: flex
      }

      #content {
        padding: 16px 16px calc(16px + var(--bnav-h) + env(safe-area-inset-bottom, 0px));
      }

      #topbar {
        padding: 0 16px;
        height: 56px
      }

      #topbar h1 {
        font-size: 17px
      }
    }

    /* Mobile: <480px — tighter padding */
    @media(max-width:480px) {
      #content {
        padding: 16px 12px calc(16px + var(--bnav-h) + env(safe-area-inset-bottom, 0px))
      }

      #topbar {
        padding: 0 12px
      }

      /* Stack flex rows vertically on small screens where needed */
      .flex-between {
        flex-wrap: wrap;
        gap: 10px
      }

      /* Full-width buttons inside session header on mobile */
      .session-header-actions {
        flex-direction: column;
        width: 100%
      }

      .session-header-actions .btn {
        width: 100%;
        justify-content: center
      }

      /* Ensure cards don't overflow */
      .card,
      .card-sm,
      .form-section,
      .profile-hero {
        padding: 14px 14px
      }

      /* Bill panel full width */
      .bill-panel {
        width: 100%
      }

      /* Menu items: wrap qty/add on small screens */
      .menu-item {
        flex-wrap: wrap;
        gap: 10px
      }

      .menu-item>.flex {
        width: 100%;
        justify-content: flex-end
      }

      /* Modal boxes: tighter padding */
      .modal-box {
        padding: 22px 18px
      }

      .modal-sheet-box {
        padding: 22px 18px calc(22px + env(safe-area-inset-bottom, 0px))
      }

      /* Stat cards: bigger numbers, consistent spacing */
      .stat-num {
        font-size: 24px
      }

      .stat-card {
        padding: 16px
      }

      /* Quick cards row on mobile */
      .grid-2.quick-actions {
        grid-template-columns: 1fr 1fr
      }
    }

    /* ── COMPONENTS ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .18);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .28);
      border-color: var(--border2)
    }

    .card-sm {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color .2s ease
    }

    .card-sm:hover {
      border-color: var(--border2)
    }

    /* Inputs — 44px+ touch target */
    .inp {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      height: 48px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
      -webkit-appearance: none;
    }

    .inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      outline: none;
      background: var(--surface);
    }

    .inp:hover:not(:focus) {
      border-color: var(--border2)
    }

    .inp::placeholder {
      color: var(--text3)
    }

    .inp[type="number"] {
      -moz-appearance: textfield
    }

    .inp[type="number"]::-webkit-inner-spin-button,
    .inp[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none
    }

    select.inp {
      cursor: pointer
    }

    /* Textarea variant */
    textarea.inp {
      height: auto;
      padding: 12px 16px;
      resize: vertical;
      min-height: 80px
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 20px;
      height: 44px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      letter-spacing: .02em;
      transition: all .2s ease;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      transition: background .2s ease
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a14;
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 24px var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-primary:active {
      transform: scale(.97) translateY(0);
      filter: brightness(.98)
    }

    .btn-dark {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border2)
    }

    .btn-dark:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-dark:active {
      transform: scale(.97) translateY(0)
    }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1.5px solid var(--danger)
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--danger-dim)
    }

    .btn-danger:active {
      transform: scale(.97) translateY(0)
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
      transform: none !important
    }

    .btn-sm {
      height: 36px;
      padding: 0 14px;
      font-size: 13px;
      border-radius: 10px
    }

    /* Icon buttons — 40px square touch target */
    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      flex-shrink: 0;
      transition: all .2s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-icon:active {
      transform: scale(.93) translateY(0)
    }

    /* Tags/Badges */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .tag-green {
      background: var(--accent-dim);
      color: var(--accent-text)
    }

    .tag-red {
      background: var(--danger-dim);
      color: var(--danger)
    }

    .tag-muted {
      background: var(--surface2);
      color: var(--text2)
    }

    /* Typography utilities */
    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px
    }

    .section-sub {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      margin-bottom: 18px
    }

    .avatar {
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0
    }

    /* Layout helpers */
    .flex {
      display: flex;
      align-items: center
    }

    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .gap-6 {
      gap: 6px
    }

    .gap-8 {
      gap: 8px
    }

    .gap-10 {
      gap: 10px
    }

    .gap-12 {
      gap: 12px
    }

    .gap-16 {
      gap: 16px
    }

    .stack {
      display: flex;
      flex-direction: column
    }

    .stack-8 {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .stack-12 {
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .stack-20 {
      display: flex;
      flex-direction: column;
      gap: 20px
    }

    .w-full {
      width: 100%
    }

    /* Grid — collapses to 1 col on mobile */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px
    }

    @media(max-width:480px) {
      .grid-2 {
        grid-template-columns: 1fr
      }

      .grid-3 {
        grid-template-columns: 1fr 1fr
      }
    }

    /* Text utilities */
    .text-accent {
      color: var(--accent)
    }

    .text-muted {
      color: var(--text2)
    }

    .text-sm {
      font-size: 13px
    }

    .text-xs {
      font-size: 11px
    }

    .text-lg {
      font-size: 18px
    }

    .font-bold {
      font-weight: 700
    }

    .font-black {
      font-weight: 800
    }

    .font-fraunces {
      font-family: 'Fraunces', serif
    }

    .font-syne {
      font-family: 'Fraunces', serif
    }

    .upper {
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(.85);
        opacity: 0
      }

      70% {
        transform: scale(1.05)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    /* Loading spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0
    }

    /* Micro-interactions: interactive elements only — NOT all * to avoid layout thrash */
    a,
    button,
    .card,
    .card-sm,
    .session-row,
    .menu-item,
    .quick-card,
    .badge-card,
    .tab,
    .bnav-item,
    .btn,
    .btn-icon,
    .stat-card,
    .theme-card,
    .emoji-btn,
    .qty-btn {
      transition-timing-function: cubic-bezier(.4, 0, .2, 1);
    }

    /* ── QUICK CARDS (dashboard action cards) ─────────────────────────────────── */
    .quick-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: all .22s ease;
      text-align: left;
      width: 100%;
    }

    .quick-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, .22);
      border-color: var(--accent);
    }

    .quick-card:active {
      transform: scale(.97) translateY(0);
    }

    .quick-card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    /* ── MODALS ───────────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000000cc;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .2s ease
    }

    .modal-sheet {
      position: fixed;
      inset: 0;
      background: #000000cc;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .2s ease
    }

    .modal-box {
      background: var(--surface);
      border-radius: 24px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .4);
      animation: slideUp .25s ease;
      border: 1px solid var(--border2)
    }

    .modal-sheet-box {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 28px 28px calc(28px + env(safe-area-inset-bottom, 0px));
      width: 100%;
      max-width: 500px;
      animation: slideUp .25s ease;
      max-height: 85vh;
      max-height: 85dvh;
      overflow-y: auto;
      border: 1px solid var(--border2);
      border-bottom: none
    }

    /* ── LOGIN PAGE ───────────────────────────────────────────────────────────── */
    #login-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: stretch;
      background: var(--bg);
    }

    .login-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      max-width: 520px;
    }

    .login-form-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, .18);
      margin-top: 32px;
      transition: box-shadow .2s ease;
    }

    .login-form-box:focus-within {
      box-shadow: 0 20px 60px rgba(0, 0, 0, .25)
    }

    .login-right {
      flex: 1;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .login-right-content {
      text-align: center;
      position: relative;
      z-index: 1;
      max-width: 340px
    }

    .login-deco {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: var(--accent-dim);
      filter: blur(100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    @media(max-width:1023px) {
      #login-page {
        flex-direction: column;
        align-items: stretch
      }

      .login-left {
        padding: 40px 24px;
        max-width: 100%
      }

      .login-right {
        display: none
      }
    }

    @media(max-width:480px) {
      .login-left {
        padding: 28px 16px
      }

      .login-form-box {
        padding: 24px 20px
      }
    }

    /* Error banner */
    .auth-error {
      background: var(--danger-dim);
      border: 1.5px solid var(--danger);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--danger);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: popIn .2s ease;
    }

    /* ── DASHBOARD STATS ──────────────────────────────────────────────────────── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .12);
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, .22);
      border-color: var(--accent)
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 3px 3px 0 0
    }

    .stat-num {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.1
    }

    .stat-label {
      font-size: 11px;
      color: var(--text2);
      font-weight: 600;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .stat-icon {
      position: absolute;
      right: 18px;
      top: 18px;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: transform .2s ease
    }

    .stat-card:hover .stat-icon {
      transform: scale(1.1) rotate(-5deg)
    }

    /* ── SESSION ROW ──────────────────────────────────────────────────────────── */
    .session-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .2s ease;
    }

    .session-row:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, .2)
    }

    .session-row:active {
      transform: scale(.99) translateY(0)
    }

    .session-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      transition: transform .2s ease
    }

    .session-row:hover .session-icon {
      transform: scale(1.05)
    }

    /* ── MENU ITEM ────────────────────────────────────────────────────────────── */
    .menu-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all .2s ease
    }

    .menu-item:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15)
    }

    .menu-emoji {
      width: 48px;
      height: 48px;
      border-radius: 13px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      transition: transform .2s ease
    }

    .menu-item:hover .menu-emoji {
      transform: scale(1.08)
    }

    /* ── BILL PANEL ───────────────────────────────────────────────────────────── */
    .bill-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .15)
    }

    .bill-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border)
    }

    .bill-row {
      padding: 11px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background .15s ease
    }

    .bill-row:hover {
      background: var(--surface)
    }

    .bill-row:last-child {
      border-bottom: none
    }

    .bill-total {
      background: var(--accent);
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    /* ── TABS ─────────────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 24px
    }

    .tab {
      flex: 1;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      transition: all .2s ease;
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Outfit', sans-serif;
      white-space: nowrap
    }

    .tab.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .15)
    }

    .tab:hover:not(.active) {
      color: var(--text);
      background: var(--surface)
    }

    /* ── BADGES ───────────────────────────────────────────────────────────────── */
    .badge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      transition: all .2s ease
    }

    .badge-card.earned {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    .badge-card:not(.earned) {
      opacity: .4
    }

    .badge-card.earned:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-dim)
    }

    .badge-emoji {
      font-size: 26px;
      margin-bottom: 8px
    }

    .badge-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text)
    }

    /* ── THEME PICKER ─────────────────────────────────────────────────────────── */
    .theme-card {
      border-radius: 16px;
      padding: 16px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all .2s ease;
      position: relative
    }

    .theme-card.active {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15)
    }

    .theme-card:hover {
      border-color: var(--border2);
      transform: translateY(-1px)
    }

    /* ── TOAST ────────────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      max-width: 320px
    }

    @media(max-width:768px) {
      #toast-container {
        top: auto;
        bottom: calc(var(--bnav-h) + 12px + env(safe-area-inset-bottom, 0px));
        right: 12px;
        left: 12px;
        max-width: none
      }
    }

    .toast {
      padding: 13px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .25);
      animation: fadeInUp .25s ease;
      pointer-events: auto;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px)
    }

    .toast-success {
      background: var(--surface);
      border: 1.5px solid var(--accent);
      color: var(--text)
    }

    .toast-error {
      background: var(--surface);
      border: 1.5px solid var(--danger);
      color: var(--text)
    }

    /* ── QTY STEPPER ──────────────────────────────────────────────────────────── */
    .qty-stepper {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s ease
    }

    .qty-stepper:hover {
      border-color: var(--border2)
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--text2);
      background: none;
      border: none;
      cursor: pointer;
      transition: all .15s ease;
      -webkit-tap-highlight-color: transparent
    }

    .qty-btn:hover {
      color: var(--accent);
      background: var(--accent-dim)
    }

    .qty-btn:active {
      transform: scale(.9)
    }

    .qty-num {
      width: 32px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      color: var(--text)
    }

    /* ── EMPTY STATE ──────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      border: 2px dashed var(--border);
      border-radius: 20px;
      transition: border-color .2s ease
    }

    .empty-state:hover {
      border-color: var(--border2)
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 10px;
      opacity: .4
    }

    .empty-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      font-style: italic
    }

    /* ── PROFILE HERO ─────────────────────────────────────────────────────────── */
    .profile-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .1);
      transition: box-shadow .2s ease
    }

    .profile-hero:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, .18)
    }

    /* ── SESSION LAYOUT ───────────────────────────────────────────────────────── */
    @media(min-width:1024px) {
      .session-layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 22px;
        align-items: start
      }
    }

    @media(max-width:1023px) {
      .session-layout {
        display: flex;
        flex-direction: column;
        gap: 20px
      }

      .session-layout>*:last-child {
        order: -1
      }

      /* Bill panel first on mobile */
    }

    /* ── SCROLLBAR ────────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text3)
    }

    /* install banner handled below */

    /* ── COLOR PICKER ─────────────────────────────────────────────────────────── */
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0
    }

    .color-swatch.active {
      border-color: var(--text);
      transform: scale(1.1)
    }

    /* ── JOIN CODE INPUT ──────────────────────────────────────────────────────── */
    .code-input {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 0 20px;
      height: 58px;
      font-size: 20px;
      font-weight: 800;
      font-family: 'Fraunces', serif;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .12em;
      width: 100%;
      text-align: center;
      transition: all .2s ease;
      -webkit-appearance: none;
    }

    .code-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-dim);
      outline: none;
      background: var(--surface)
    }

    .code-input:hover:not(:focus) {
      border-color: var(--border2)
    }

    /* ── STATUS BANNERS ───────────────────────────────────────────────────────── */
    .status-banner {
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 14px
    }

    .status-banner-locked {
      background: var(--danger-dim);
      border: 1.5px solid var(--danger);
      color: var(--danger)
    }

    .status-banner-closed {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text2)
    }

    /* ── EMOJI PICKER ─────────────────────────────────────────────────────────── */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px
    }

    .emoji-btn {
      padding: 8px;
      border-radius: 10px;
      font-size: 16px;
      background: var(--surface2);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .15s ease;
      text-align: center;
      -webkit-tap-highlight-color: transparent
    }

    .emoji-btn.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: scale(1.08)
    }

    .emoji-btn:hover:not(.active) {
      border-color: var(--border2);
      transform: scale(1.04);
      background: var(--surface)
    }

    @media(max-width:480px) {
      .emoji-grid {
        grid-template-columns: repeat(6, 1fr)
      }
    }

    /* ── INSTALL BANNER ───────────────────────────────────────────────────────── */
    #install-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 300;
      background: var(--accent);
      color: #0a0a14;
      padding: 10px 16px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .3);
    }

    #install-banner.show {
      display: flex;
    }

    #install-banner button {
      background: rgba(0, 0, 0, .2);
      border: none;
      color: #0a0a14;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Outfit', sans-serif;
    }

    #install-banner .close-banner {
      margin-left: auto;
      background: none;
      font-size: 18px;
      padding: 2px 6px;
    }


    /* ── SIDEBAR INSTALL ITEM HIDDEN ───────────────────────────────────────── */
    #sidebar .nav-install {
      display: none;
    }

    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;

    const DB = {

        } catch (e) { console.error('upsertUser exception:', e); return false; }

        const db = getDB(); if (!db) return;

          const { error } = await db.from('shops').upsert({ id: s.id, name: s.name, address: s.address, creator_id: s.creatorId, menu: s.menu });

        try {
          if (!o.sessionId || !o.userId) { toast('Invalid order data', 'error'); return false; }
          const { error } = await db.from('orders').upsert({ id: o.id, session_id: o.sessionId, user_id: o.userId, user_name: o.userName, item_id: o.itemId, item_name: o.itemName, price: o.price, quantity: o.quantity, note: o.note || '' });

    // ── CONSTANTS ────────────────────────────────────────────────────────────────
    const SK = { SHOPS: 'tr8_shops', SESSIONS: 'tr8_sessions', ORDERS: 'tr8_orders', USERS: 'tr8_users', AUTH: 'tr8_auth', THEME: 'tr8_theme' };

    function loadFromLocalStorage() {
      const g = (k, fb) => { try { return JSON.parse(localStorage.getItem(k) || fb) } catch { return JSON.parse(fb) } };
      state.shops = g(SK.SHOPS, '[]');
      state.sessions = g(SK.SESSIONS, '[]');
      state.orders = g(SK.ORDERS, '[]');
      state.users = g(SK.USERS, '[]');
    }
    async function load() {
      try {
        const g = (k, fb) => { try { return JSON.parse(localStorage.getItem(k) || fb) } catch { return JSON.parse(fb) } };
        state.theme = localStorage.getItem(SK.THEME) || 'dark';
        const auth = g(SK.AUTH, 'null');
        if (auth) { state.user = auth; state.view = 'home'; }

        const savedSession = localStorage.getItem('activeSession');

      const db = getDB();

      ['orders', 'sessions', 'shops', 'users'].forEach(table => {

            await DB.loadAll();
            render();
          })
          .subscribe();
      });

      const t = THEMES[name] || THEMES.dark;
      document.documentElement.setAttribute('data-theme', name === 'dark' ? '' : name);
      const r = document.documentElement.style;
      Object.entries(t).forEach(([k, v]) => {
        if (!['name'].includes(k)) r.setProperty('--' + k, v);
      });
      // special: dark sets no data-theme attr since css default is dark
      if (name === 'dark') { document.documentElement.removeAttribute('data-theme'); }
      else { document.documentElement.setAttribute('data-theme', name); }
    }

        state._authError = 'Please fill in all fields';

      if (p.length < 3) {

        save(); render(); return;

      if (isReg) {
        if (state.users.find(x => x.username.toLowerCase() === u)) {
          state._authError = 'Username already taken — try another';
          save(); render(); return;

        const nu = {

          await DB.loadAll(); render();

        setState({ view: 'home', theme: userTheme, _loginName: '', _loginPass: '', _showPass: false, _authError: null });
        applyTheme(userTheme);
      }

    function exportShop(shop) {
      if (!shop) { toast('Shop not found', 'error'); return; }
      if (!shop.menu || shop.menu.length === 0) { toast('Menu is empty — nothing to export', 'error'); return; }
      const data = JSON.stringify({ name: shop.name, address: shop.address, menu: shop.menu.map(({ name, price, emoji }) => ({ name, price, emoji })) }, null, 2);
      // PRIMARY: copy to clipboard
      navigator.clipboard.writeText(data)
        .then(() => toast(`${shop.name} JSON copied to clipboard ✅`))
        .catch(() => toast('Failed to copy JSON', 'error'));
      // SECONDARY: also trigger file download
      try {
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `TeaRound_${shop.name.replace(/\s+/g, '_')}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      } catch (e) { console.warn('File download failed', e); }
    }

    async function importShop(json) {
      try {
        const data = JSON.parse(json);
        if (!data.name || !Array.isArray(data.menu)) throw new Error();
        const s = { id: gid(), name: data.name, address: data.address || 'Imported', menu: data.menu.map(m => ({ ...m, id: gid() })), creatorId: state.user.id };
        state.shops.push(s); setState({ modal: null });
        toast(`Imported ${s.name}!`);
        await DB.upsertUser(state.user);
        await DB.upsertShop(s);
        await DB.loadAll(); render();
      } catch { toast('Invalid JSON format', 'error'); }
    }

    async function downloadSummary() {
      try {
        const session = getSession(), shop = getSessionShop(), so = getSessionOrders();
        if (!session) { toast('No active session', 'error'); return; }
        if (so.length === 0) { toast('No orders to export', 'error'); return; }

        // Build aggregated totals
        const agg = Object.entries(so.reduce((a, o) => { a[o.itemName] = (a[o.itemName] || 0) + o.quantity; return a }, {}));
        const totalItems = so.reduce((a, o) => a + o.quantity, 0);
        const totalPrice = so.reduce((a, o) => a + o.price * o.quantity, 0);
        const dateStr = new Date().toLocaleString('en-IN', { day: '2-digit', month: '1-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });

        const pad = (str, len) => String(str).padEnd(len, ' ');
        const title = `TEA ROUND SUMMARY - ${(shop?.name || 'TeaRound').toUpperCase()}`;
        const divider = '-'.repeat(38);

        let lines = [];
        lines.push(title);
        lines.push(`Date: ${dateStr}`);
        lines.push(`Location: ${session.location || '—'}`);
        lines.push(divider);
        agg.forEach(([name, qty]) => {
          lines.push(`${pad(name, 20)} x ${qty}`);
        });
        lines.push(divider);
        lines.push(`Total Items: ${totalItems}`);
        lines.push(`Total Price: ₹${totalPrice}`);
        lines.push(`Breakdown by User:`);
        so.forEach(o => {
          for (let i = 0; i < o.quantity; i++) {
            lines.push(`- ${o.userName}: ${o.itemName} (x1)`);
          }
        });

        const text = lines.join('\n');
        const fileName = `TeaRound_Summary_${session.id}_${new Date().toISOString().slice(0, 10)}.txt`;

        // Method 1: Try native share API (best on mobile)
        if (navigator.share) {
          try {
            const file = new File([text], fileName, { type: 'text/plain' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: 'TeaRound Summary' });
              toast('Summary shared! ✅');
              return;
            }
          } catch (shareErr) {
            if (shareErr.name !== 'AbortError') console.warn('Share failed, trying download', shareErr);
            else return; // user cancelled share
          }
        }

        // Method 2: Clipboard + file download
        try { await navigator.clipboard.writeText(text); toast('Summary copied to clipboard! 📋'); } catch (_) { }

        try {
          const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = fileName;
          document.body.appendChild(a); a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
          toast('Summary downloaded! ✅');
        } catch (dlErr) {
          // Method 3: data URI fallback for strict mobile browsers
          const dataUri = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
          const a = document.createElement('a');
          a.href = dataUri; a.download = fileName;
          document.body.appendChild(a); a.click();
          document.body.removeChild(a);
          toast('Summary downloaded! ✅');
        }
      } catch (err) { console.error('Download failed', err); toast('Download failed — try copying the text manually', 'error'); }
    }

    function quickJoin() {

        return id === raw || jc === raw || id === 'ROUND-' + raw || jc === 'ROUND-' + raw || id.endsWith('-' + raw);
      });
      if (s) {
        state.activeSessionId = s.id;
        localStorage.setItem('activeSession', s.id);

        setState({}); // optimistic UI

    async function createSession() {
      try {
        const shopId = document.getElementById('session-shop')?.value;
        const loc = document.getElementById('session-loc')?.value?.trim() || 'Office';
        if (!shopId) { toast('Select a shop', 'error'); return; }
        const id = `ROUND-${gid()}`.toUpperCase();
        const session = { id, joinCode: id, shopId, location: loc, creatorId: state.user.id, locked: false, closed: false };
        state.sessions.push(session);
        setState({ activeSessionId: id, view: 'session', _newSessionShop: '', _newSessionLoc: '' });
        toast('Round started! Share the code with your team 🚀');
        // Ensure user and shop exist in DB first (FK chain: users → shops → sessions)
        const shop = state.shops.find(s => s.id === shopId);
        await DB.upsertUser(state.user);
        if (shop) await DB.upsertShop(shop);
        const ok = await DB.upsertSession(session);
        if (ok !== false) { await DB.loadAll(); render(); }
      } catch (e) { console.error('createSession failed', e); toast('Failed to create round', 'error'); }
    }

          <div class="font-syne font-black" style="font-size:28px;color:#0a0a14">₹${total}</div>
        </div>
      </div>
      ${uniqueUsers.length > 0 ? `
      <div style="padding:12px 16px;border-top:1px solid rgba(0,0,0,.1)">

        ${Object.values(so.reduce((a, o) => {
          if (!a[o.userId]) a[o.userId] = { name: o.userName, total: 0 };
          a[o.userId].total += o.price * o.quantity;
          return a;
        }, {})).map(u => `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:12px;font-weight:700;color:#0a0a14;opacity:.8">${u.name}</span>
            <span style="font-size:13px;font-weight:800;color:#0a0a14">₹${u.total}</span>
          </div>
        `).join('')}
      </div>` : ''}
    </div>`;

      return `
  ${renderTopbar(shop?.name || 'Round', 'home')}
  <div id="content">
    <!-- Session header strip -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        <div class="flex gap-8" style="margin-bottom:5px">
          <span class="tag tag-green">${session.id}</span>

          </button>

        <button class="btn btn-dark" onclick="downloadSummary()">
          ${svgIcon('download', 16)}
        </button>
        <button class="btn btn-primary" onclick="setState({modal:{type:'share'}})">
          ${svgIcon('share', 16)} Share
        </button>
      </div>
    </div>

    ${session.locked && !session.closed ? `<div class="status-banner status-banner-locked" style="margin-bottom:20px">${svgIcon('lock', 16)} This round is locked by the host. No new orders.</div>` : ''}
    ${session.closed ? `<div class="status-banner status-banner-closed" style="margin-bottom:20px">${svgIcon('clock', 16)} This round is closed.</div>` : ''}

    <div class="session-layout">
      <!-- Left: orders + menu -->
      <div class="stack-20">
        <!-- Member orders -->
        <div>
          <div class="section-title">Member Orders</div>
          <div class="section-sub">Who ordered what</div>
          <div class="stack-8">
            ${so.length === 0 ? `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No orders yet. Be first!</div></div>`
          : so.map(o => `
              <div class="card-sm" style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px">
                <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">
                  ${avatarHtml(state.users.find(u => u.id === o.userId) || { username: o.userName, avatarColor: '#888' }, 34, 8)}
                  <div style="min-width:0">
                    <div class="tag tag-green" style="margin-bottom:2px">${o.userName}</div>

                  </div>

              `<button class="btn-icon" style="color:var(--danger);width:32px;height:32px" onclick="removeOrder('${o.id}')">${svgIcon('trash', 14)}</button>` : ''}

            `).join('')}
          </div>
        </div>

        <!-- Menu to order from -->
        ${!session.closed && !session.locked ? `

          <div class="stack-8">

                    <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>

      <!-- Right: bill panel -->

    function toggleLock(id) {
      state.sessions = state.sessions.map(s => s.id === id ? { ...s, locked: !s.locked } : s);
      const updated = state.sessions.find(s => s.id === id);
      setState({}); toast(updated?.locked ? 'Round locked' : 'Round unlocked');
      const shop = updated ? state.shops.find(s => s.id === updated.shopId) : null;
      Promise.resolve()
        .then(() => DB.upsertUser(state.user))
        .then(() => shop ? DB.upsertShop(shop) : null)
        .then(() => DB.upsertSession(updated))
        .then(async () => { await DB.loadAll(); render(); })
        .catch(e => console.error('toggleLock sync failed', e));
    }
    function closeRound(id) {
      confirmDelete('Close this round? Orders will be frozen.', () => {
        state.sessions = state.sessions.map(s => s.id === id ? { ...s, closed: true, locked: true } : s);
        const updated = state.sessions.find(s => s.id === id);
        setState({}); toast('Round closed');
        const shop = updated ? state.shops.find(s => s.id === updated.shopId) : null;
        Promise.resolve()
          .then(() => DB.upsertUser(state.user))
          .then(() => shop ? DB.upsertShop(shop) : null)
          .then(() => DB.upsertSession(updated))
          .then(async () => { await DB.loadAll(); render(); })
          .catch(e => console.error('closeRound sync failed', e));
      });
    }
    function removeOrder(id) {
      try {
        state.orders = state.orders.filter(o => o.id !== id); 
        setState({}); 
        toast('Order removed 🗑️');
        DB.deleteOrder(id).then(async () => {
          await DB.loadAll();
          render();
        }).catch(e => console.error('removeOrder DB sync failed', e));
      } catch (e) { console.error('removeOrder failed', e); toast('Failed to remove order', 'error'); }
    }
    function changeQty(itemId, delta) {
      const q = state._orderQty || {};
      q[itemId] = Math.max(1, (q[itemId] || 1) + delta);
      state._orderQty = q;
      const el = document.getElementById(`qty-${itemId}`);
      if (el) el.textContent = q[itemId];
    }
    function addOrder(sessionId, itemId, itemName, price) {
      try {
        const qty = (state._orderQty || {})[itemId] || 1;
        const order = { id: gid(), sessionId, userId: state.user.id, userName: state.user.display_name || state.user.username, itemId, itemName, price: parseFloat(price) || 0, quantity: qty, note: '' };
        if (!order.sessionId || !order.userId) { toast('Invalid session or user', 'error'); return; }
        state.orders.push(order);
        const q = state._orderQty || {}; q[itemId] = 1; state._orderQty = q;
        setState({}); // optimistic UI
        // Ensure full FK chain exists: user → shop → session → order
        const session = state.sessions.find(s => s.id === sessionId);
        const shop = session ? state.shops.find(s => s.id === session.shopId) : null;
        Promise.resolve()
          .then(() => DB.upsertUser(state.user))
          .then(() => shop ? DB.upsertShop(shop) : null)
          .then(() => session ? DB.upsertSession(session) : null)
          .then(() => DB.upsertOrder(order))
          .then(async (ok) => {
            if (ok !== false) {
              toast(`${itemName} ×${qty} added! ☕`);
              await DB.loadAll(); render();
            }
          })
          .catch(e => { console.error('addOrder chain failed', e); toast(`${itemName} added (offline)`, 'success'); });
      } catch (e) { console.error('addOrder failed', e); toast('Failed to add order', 'error'); }
    }

      }

    // ── INSTALL BANNER ────────────────────────────────────────────────────────────

    async function installApp() {

    // ── RENDER ────────────────────────────────────────────────────────────────────
    function render() {

      document.getElementById('session-shop')?.addEventListener('change', function () {

    // ── AVATAR CROP SYSTEM ────────────────────────────────────────────────────────
    const _crop = {
      img: null, src: null,
      x: 0, y: 0, scale: 1,
      dragging: false, startX: 0, startY: 0, startImgX: 0, startImgY: 0,
      canvasW: 280, canvasH: 280
    };

    function openAvatarPicker() {
      const inp = document.getElementById('avatar-file-input');
      if (inp) inp.click();
    }

    function handleAvatarFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        _crop.src = e.target.result;
        _crop.x = 0; _crop.y = 0; _crop.scale = 1;
        showCropModal();
      };
      reader.readAsDataURL(file);
      input.value = ''; // reset so same file can be re-selected
    }

    function showCropModal() {
      // Remove existing crop modal if any
      const existing = document.getElementById('crop-modal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'crop-modal';
      modal.className = 'crop-modal-overlay';
      modal.innerHTML = `
        <div class="crop-modal-box">
          <div class="font-syne font-black" style="font-size:20px;color:var(--text);margin-bottom:6px">Edit Profile Photo</div>
          <div class="text-muted text-sm" style="margin-bottom:18px">Drag to reposition · Pinch or scroll to zoom</div>
          <div class="crop-canvas-wrap" id="crop-area">
            <img id="crop-img" src="${_crop.src}" draggable="false"/>
            <div class="crop-guide"></div>
          </div>
          <div style="margin-bottom:18px">
            <label class="form-label" style="margin-bottom:8px">Zoom</label>
            <input type="range" id="crop-zoom" min="0.3" max="3" step="0.01" value="1"
              style="width:100%;accent-color:var(--accent)"
              oninput="setCropScale(parseFloat(this.value))"/>
          </div>
          <div class="flex gap-10">
            <button class="btn btn-dark" style="flex:1" onclick="closeCropModal()">Cancel</button>
            <button class="btn btn-danger btn-sm" style="padding:0 14px" onclick="removeAvatar()">Remove Photo</button>
            <button class="btn btn-primary" style="flex:1" onclick="cropAndSave()">✓ Save</button>
          </div>
        </div>`;
      document.body.appendChild(modal);

      // Wait for image to load then set initial position/scale
      const img = document.getElementById('crop-img');
      img.onload = () => {
        _crop.img = img;
        // Auto-fit: scale so image fills the crop area
        const fitScale = Math.max(_crop.canvasW / img.naturalWidth, _crop.canvasH / img.naturalHeight);
        _crop.scale = fitScale;
        _crop.x = (_crop.canvasW - img.naturalWidth * fitScale) / 2;
        _crop.y = (_crop.canvasH - img.naturalHeight * fitScale) / 2;
        document.getElementById('crop-zoom').value = fitScale;
        document.getElementById('crop-zoom').min = Math.max(0.1, fitScale * 0.5);
        applyCropTransform();
        attachCropEvents();
      };
      if (img.complete) img.onload();
    }

    function applyCropTransform() {
      const img = document.getElementById('crop-img');
      if (!img || !_crop.img) return;
      img.style.width = (_crop.img.naturalWidth * _crop.scale) + 'px';
      img.style.height = (_crop.img.naturalHeight * _crop.scale) + 'px';
      img.style.left = _crop.x + 'px';
      img.style.top = _crop.y + 'px';
    }

    function setCropScale(newScale) {
      const area = document.getElementById('crop-area');
      if (!area || !_crop.img) return;
      const cx = _crop.canvasW / 2, cy = _crop.canvasH / 2;
      // Scale around center
      const ratio = newScale / _crop.scale;
      _crop.x = cx - (cx - _crop.x) * ratio;
      _crop.y = cy - (cy - _crop.y) * ratio;
      _crop.scale = newScale;
      applyCropTransform();
    }

    function attachCropEvents() {
      const area = document.getElementById('crop-area');
      if (!area) return;

      // Mouse drag
      area.addEventListener('mousedown', e => {
        _crop.dragging = true;
        _crop.startX = e.clientX; _crop.startY = e.clientY;
        _crop.startImgX = _crop.x; _crop.startImgY = _crop.y;
        e.preventDefault();
      });
      window.addEventListener('mousemove', e => {
        if (!_crop.dragging) return;
        _crop.x = _crop.startImgX + (e.clientX - _crop.startX);
        _crop.y = _crop.startImgY + (e.clientY - _crop.startY);
        applyCropTransform();
      });
      window.addEventListener('mouseup', () => { _crop.dragging = false; });

      // Touch drag + pinch
      let lastTouchDist = null;
      area.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
          _crop.dragging = true;
          _crop.startX = e.touches[0].clientX; _crop.startY = e.touches[0].clientY;
          _crop.startImgX = _crop.x; _crop.startImgY = _crop.y;
        } else if (e.touches.length === 2) {
          lastTouchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY);
        }
        e.preventDefault();
      }, { passive: false });
      area.addEventListener('touchmove', e => {
        if (e.touches.length === 1 && _crop.dragging) {
          _crop.x = _crop.startImgX + (e.touches[0].clientX - _crop.startX);
          _crop.y = _crop.startImgY + (e.touches[0].clientY - _crop.startY);
          applyCropTransform();
        } else if (e.touches.length === 2 && lastTouchDist !== null) {
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY);
          const newScale = Math.min(3, Math.max(0.1, _crop.scale * (dist / lastTouchDist)));
          setCropScale(newScale);
          document.getElementById('crop-zoom').value = newScale;
          lastTouchDist = dist;
        }
        e.preventDefault();
      }, { passive: false });
      area.addEventListener('touchend', e => {
        if (e.touches.length < 2) lastTouchDist = null;
        if (e.touches.length === 0) _crop.dragging = false;
      });

      // Scroll to zoom (desktop)
      area.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        const newScale = Math.min(3, Math.max(0.1, _crop.scale + delta));
        setCropScale(newScale);
        document.getElementById('crop-zoom').value = newScale;
      }, { passive: false });
    }

    function closeCropModal() {
      const m = document.getElementById('crop-modal');
      if (m) m.remove();
    }

    function removeAvatar() {
      const patch = { avatarUrl: null };
      updateUser(patch);
      DB.upsertUser({ ...state.user, ...patch, theme: state.theme });
      setState({ _editProfile: false });
      closeCropModal();
      toast('Profile photo removed');
    }

    function cropAndSave() {
      if (!_crop.img || !_crop.src) return;
      try {
        const SIZE = 256; // output canvas size
        const canvas = document.createElement('canvas');
        canvas.width = SIZE; canvas.height = SIZE;
        const ctx = canvas.getContext('2d');

        // The crop area is 280×280. We need to map what's visible in the center
        // circle (which has a guide circle at inset:20, so radius = 120)
        // But we just export the full 280×280 square, cropped to SIZE×SIZE.
        const scaleToOutput = SIZE / _crop.canvasW;
        ctx.drawImage(
          _crop.img,
          _crop.x * scaleToOutput,
          _crop.y * scaleToOutput,
          _crop.img.naturalWidth * _crop.scale * scaleToOutput,
          _crop.img.naturalHeight * _crop.scale * scaleToOutput
        );

        // Round to circle by clipping
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        const patch = { avatarUrl: dataUrl };
        updateUser(patch);
        DB.upsertUser({ ...state.user, ...patch, theme: state.theme });
        setState({});
        closeCropModal();
        toast('Profile photo saved! 📸');
      } catch (e) {
        console.error('Crop failed', e);
        toast('Failed to save photo', 'error');
      }
    }

    // ── BOOT ──────────────────────────────────────────────────────────────────────
    load(); // async — renders twice (localStorage first, then DB)

    // Inject dynamic manifest to fix PWA icon and start_url
    (function injectManifest() {
      try {
        const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="96" fill="#00c896"/><text x="256" y="340" text-anchor="middle" font-size="300" fill="#0a0a14">☕</text></svg>`;
        const iconUrl = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
        const manifest = {
          name: 'TeaRound Pro',
          short_name: 'TeaRound',
          description: 'Effortless group tea & coffee orders',
          start_url: './',
          scope: './',
          display: 'standalone',
          background_color: '#0d0d14',
          theme_color: '#00c896',
          icons: [
            { src: iconUrl, sizes: '192x192', type: 'image/svg+xml' },
            { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
          ]
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        const url = URL.createObjectURL(blob);
        const existing = document.querySelector('link[rel="manifest"]');
        if (existing) existing.href = url;
      } catch (e) { console.warn('Manifest inject failed', e); }
    })();

    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => { });
    }
  </script>
</body>
