<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TeaRound" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d0d14" />
  <meta name="description" content="Effortless group tea & coffee orders" />
  <link rel="manifest" href="./manifest.json" />
  <title>TeaRound Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ── RESET & BASE ─────────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      max-width: 100%
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      overflow-x: hidden
    }

    body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      overflow-x: hidden;
      background: #0d0d14;
      -webkit-font-smoothing: antialiased
    }

    input,
    button,
    textarea,
    select {
      font-family: inherit
    }

    button {
      cursor: pointer;
      border: none;
      background: none
    }

    input,
    textarea {
      border: none;
      outline: none
    }

    img {
      max-width: 100%;
      display: block
    }

    /* ── CSS VARIABLES / THEMES ───────────────────────────────────────────────── */
    :root {
      --bg: #0d0d14;
      --surface: #141420;
      --surface2: #1a1a2e;
      --border: #ffffff0f;
      --border2: #ffffff18;
      --text: #f0f0ff;
      --text2: #8888aa;
      --text3: #44445a;
      --accent: #00c896;
      --accent-dim: #00c89618;
      --accent-text: #00c896;
      --danger: #ff4466;
      --danger-dim: #ff446618;
      --warn: #f59e0b;
      --shadow: 0 4px 24px #00000055;
      --shadow-md: 0 8px 40px #00000055;
      --shadow-accent: 0 8px 40px #00c89630;
      --nav-bg: #0d0d14ee;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --sidebar-w: 256px;
      --topbar-h: 64px;
      --bnav-h: 64px;
    }

    [data-theme="light"] {
      --bg: #f4f4f0;
      --surface: #ffffff;
      --surface2: #f0f0ea;
      --border: #e2e2da;
      --border2: #d0d0c8;
      --text: #1a1a2e;
      --text2: #55557a;
      --text3: #aaaacc;
      --accent: #00a87a;
      --accent-dim: #00a87a15;
      --accent-text: #007a58;
      --danger: #e02050;
      --danger-dim: #e0205015;
      --warn: #d97706;
      --shadow: 0 2px 12px #0000000d;
      --shadow-md: 0 4px 24px #0000000a;
      --shadow-accent: 0 8px 32px #00a87a25;
      --nav-bg: #fffffff0;
    }

    [data-theme="warm"] {
      --bg: #1a1208;
      --surface: #231a0a;
      --surface2: #2e2010;
      --border: #ffffff0a;
      --border2: #ffffff15;
      --text: #f5e6c8;
      --text2: #9a7a50;
      --text3: #5a4030;
      --accent: #f0a030;
      --accent-dim: #f0a03018;
      --accent-text: #f0a030;
      --danger: #e05030;
      --danger-dim: #e0503018;
      --warn: #f0a030;
      --shadow: 0 8px 40px #00000066;
      --shadow-md: 0 8px 40px #00000066;
      --shadow-accent: 0 8px 40px #f0a03030;
      --nav-bg: #1a1208ee;
    }

    [data-theme="neon"] {
      --bg: #020208;
      --surface: #06060f;
      --surface2: #0a0a18;
      --border: #00ffcc08;
      --border2: #00ffcc15;
      --text: #d0d0ff;
      --text2: #5050aa;
      --text3: #2a2a5a;
      --accent: #00ffcc;
      --accent-dim: #00ffcc10;
      --accent-text: #00ffcc;
      --danger: #ff0066;
      --danger-dim: #ff006615;
      --warn: #ffaa00;
      --shadow: 0 8px 60px #00000088;
      --shadow-md: 0 8px 60px #00000088;
      --shadow-accent: 0 0 40px #00ffcc20;
      --nav-bg: #020208f0;
    }

    /* ── APP SHELL ────────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      overflow-x: hidden;
      width: 100%;
    }

    /* ── SIDEBAR (desktop ≥1024px) ────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
    }

    #sidebar .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      margin-bottom: 32px
    }

    #sidebar .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    #sidebar .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.3px
    }

    #sidebar .logo-sub {
      font-size: 10px;
      color: var(--text2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em
    }

    #sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1
    }

    #sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 14px;
      border-radius: 12px;
      color: var(--text2);
      font-weight: 600;
      font-size: 14px;
      transition: all .2s ease;
      text-decoration: none;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    #sidebar .nav-item:hover {
      background: var(--accent-dim);
      color: var(--accent);
      transform: translateX(2px)
    }

    #sidebar .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent)
    }

    #sidebar .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: .8;
      transition: all .2s ease
    }

    #sidebar .nav-item.active svg {
      opacity: 1;
      filter: drop-shadow(0 0 4px var(--accent))
    }

    #sidebar .nav-item:hover svg {
      opacity: 1
    }

    #sidebar .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 20px
    }

    #sidebar .sidebar-footer {
      padding-top: 16px;
      border-top: 1px solid var(--border)
    }

    /* ── MAIN CONTENT ─────────────────────────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: calc(100vw - var(--sidebar-w));
    }

    #topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: box-shadow .2s ease;
    }

    #topbar:has(+#main *:hover) {
      box-shadow: 0 1px 0 var(--border2)
    }

    #topbar h1 {
      font-family: 'Syne', sans-serif;
      font-size: 19px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.2px
    }

    /* Content area with safe max-width */
    #content {
      padding: 28px;
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* ── BOTTOM NAV (mobile <768px) ───────────────────────────────────────────── */
    #bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--nav-bg);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 8px 4px calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
      justify-content: space-around;
      height: calc(var(--bnav-h) + env(safe-area-inset-bottom, 0px));
    }

    #bottom-nav .bnav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 12px;
      border-radius: 12px;
      color: var(--text3);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: none;
      border: none;
      cursor: pointer;
      transition: all .2s ease;
      min-width: 56px;
    }

    #bottom-nav .bnav-item svg {
      width: 22px;
      height: 22px;
      transition: all .2s ease
    }

    #bottom-nav .bnav-item:hover {
      color: var(--text2);
      background: var(--surface2)
    }

    #bottom-nav .bnav-item.active {
      color: var(--accent);
      transform: scale(1.1) translateY(-1px);
      background: var(--accent-dim);
    }

    #bottom-nav .bnav-item.active svg {
      filter: drop-shadow(0 0 8px var(--accent));
      transform: scale(1.05);
    }

    #bottom-nav .bnav-item:active {
      transform: scale(.93)
    }

    /* ── BREAKPOINTS ──────────────────────────────────────────────────────────── */
    /* Tablet: 768–1023px — hide sidebar, show bottom nav, but keep content padded */
    @media(max-width:1023px) {
      #sidebar {
        display: none
      }

      #main {
        margin-left: 0;
        max-width: 100vw;
      }

      #bottom-nav {
        display: flex
      }

      #content {
        padding: 20px 16px calc(20px + var(--bnav-h) + env(safe-area-inset-bottom, 0px));
      }

      #topbar {
        padding: 0 16px;
        height: 56px
      }

      #topbar h1 {
        font-size: 17px
      }
    }

    /* Mobile: <480px — tighter padding */
    @media(max-width:480px) {
      #content {
        padding: 16px 12px calc(16px + var(--bnav-h) + env(safe-area-inset-bottom, 0px))
      }

      #topbar {
        padding: 0 12px
      }

      /* Stack flex rows vertically on small screens where needed */
      .flex-between {
        flex-wrap: wrap;
        gap: 10px
      }

      /* Full-width buttons inside session header on mobile */
      .session-header-actions {
        flex-direction: column;
        width: 100%
      }

      .session-header-actions .btn {
        width: 100%;
        justify-content: center
      }

      /* Ensure cards don't overflow */
      .card,
      .card-sm,
      .form-section,
      .profile-hero {
        padding: 14px 14px
      }

      /* Bill panel full width */
      .bill-panel {
        width: 100%
      }

      /* Menu items: wrap qty/add on small screens */
      .menu-item {
        flex-wrap: wrap;
        gap: 10px
      }

      .menu-item>.flex {
        width: 100%;
        justify-content: flex-end
      }

      /* Modal boxes: tighter padding */
      .modal-box {
        padding: 22px 18px
      }

      .modal-sheet-box {
        padding: 22px 18px calc(22px + env(safe-area-inset-bottom, 0px))
      }

      /* Stat cards: bigger numbers, consistent spacing */
      .stat-num {
        font-size: 24px
      }

      .stat-card {
        padding: 16px
      }

      /* Quick cards row on mobile */
      .grid-2.quick-actions {
        grid-template-columns: 1fr 1fr
      }
    }

    /* ── COMPONENTS ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .18);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .28);
      border-color: var(--border2)
    }

    .card-sm {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color .2s ease
    }

    .card-sm:hover {
      border-color: var(--border2)
    }

    /* Inputs — 44px+ touch target */
    .inp {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      height: 48px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
      -webkit-appearance: none;
    }

    .inp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      outline: none;
      background: var(--surface);
    }

    .inp:hover:not(:focus) {
      border-color: var(--border2)
    }

    .inp::placeholder {
      color: var(--text3)
    }

    .inp[type="number"] {
      -moz-appearance: textfield
    }

    .inp[type="number"]::-webkit-inner-spin-button,
    .inp[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none
    }

    select.inp {
      cursor: pointer
    }

    /* Textarea variant */
    textarea.inp {
      height: auto;
      padding: 12px 16px;
      resize: vertical;
      min-height: 80px
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 20px;
      height: 44px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .02em;
      transition: all .2s ease;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      transition: background .2s ease
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a14;
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 24px var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-primary:active {
      transform: scale(.97) translateY(0);
      filter: brightness(.98)
    }

    .btn-dark {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border2)
    }

    .btn-dark:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-dark:active {
      transform: scale(.97) translateY(0)
    }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1.5px solid var(--danger)
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--danger-dim)
    }

    .btn-danger:active {
      transform: scale(.97) translateY(0)
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
      transform: none !important
    }

    .btn-sm {
      height: 36px;
      padding: 0 14px;
      font-size: 13px;
      border-radius: 10px
    }

    /* Icon buttons — 40px square touch target */
    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      flex-shrink: 0;
      transition: all .2s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px)
    }

    .btn-icon:active {
      transform: scale(.93) translateY(0)
    }

    /* Tags/Badges */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .tag-green {
      background: var(--accent-dim);
      color: var(--accent-text)
    }

    .tag-red {
      background: var(--danger-dim);
      color: var(--danger)
    }

    .tag-muted {
      background: var(--surface2);
      color: var(--text2)
    }

    /* Typography utilities */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px
    }

    .section-sub {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      margin-bottom: 18px
    }

    .avatar {
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0
    }

    /* Layout helpers */
    .flex {
      display: flex;
      align-items: center
    }

    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .gap-6 {
      gap: 6px
    }

    .gap-8 {
      gap: 8px
    }

    .gap-10 {
      gap: 10px
    }

    .gap-12 {
      gap: 12px
    }

    .gap-16 {
      gap: 16px
    }

    .stack {
      display: flex;
      flex-direction: column
    }

    .stack-8 {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .stack-12 {
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .stack-20 {
      display: flex;
      flex-direction: column;
      gap: 20px
    }

    .w-full {
      width: 100%
    }

    /* Grid — collapses to 1 col on mobile */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px
    }

    @media(max-width:480px) {
      .grid-2 {
        grid-template-columns: 1fr
      }

      .grid-3 {
        grid-template-columns: 1fr 1fr
      }
    }

    /* Text utilities */
    .text-accent {
      color: var(--accent)
    }

    .text-muted {
      color: var(--text2)
    }

    .text-sm {
      font-size: 13px
    }

    .text-xs {
      font-size: 11px
    }

    .text-lg {
      font-size: 18px
    }

    .font-bold {
      font-weight: 700
    }

    .font-black {
      font-weight: 800
    }

    .font-syne {
      font-family: 'Syne', sans-serif
    }

    .upper {
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(.85);
        opacity: 0
      }

      70% {
        transform: scale(1.05)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    /* Loading spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0
    }

    /* Micro-interactions: interactive elements only — NOT all * to avoid layout thrash */
    a,
    button,
    .card,
    .card-sm,
    .session-row,
    .menu-item,
    .quick-card,
    .badge-card,
    .tab,
    .bnav-item,
    .btn,
    .btn-icon,
    .stat-card,
    .theme-card,
    .emoji-btn,
    .qty-btn {
      transition-timing-function: cubic-bezier(.4, 0, .2, 1);
    }

    /* ── MODALS ───────────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000000cc;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .2s ease
    }

    .modal-sheet {
      position: fixed;
      inset: 0;
      background: #000000cc;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .2s ease
    }

    .modal-box {
      background: var(--surface);
      border-radius: 24px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .4);
      animation: slideUp .25s ease;
      border: 1px solid var(--border2)
    }

    .modal-sheet-box {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 28px 28px calc(28px + env(safe-area-inset-bottom, 0px));
      width: 100%;
      max-width: 500px;
      animation: slideUp .25s ease;
      max-height: 85vh;
      max-height: 85dvh;
      overflow-y: auto;
      border: 1px solid var(--border2);
      border-bottom: none
    }

    /* ── LOGIN PAGE ───────────────────────────────────────────────────────────── */
    #login-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: stretch;
      background: var(--bg);
    }

    .login-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      max-width: 520px;
    }

    .login-form-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, .18);
      margin-top: 32px;
      transition: box-shadow .2s ease;
    }

    .login-form-box:focus-within {
      box-shadow: 0 20px 60px rgba(0, 0, 0, .25)
    }

    .login-right {
      flex: 1;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .login-right-content {
      text-align: center;
      position: relative;
      z-index: 1;
      max-width: 340px
    }

    .login-deco {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: var(--accent-dim);
      filter: blur(100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    @media(max-width:1023px) {
      #login-page {
        flex-direction: column;
        align-items: stretch
      }

      .login-left {
        padding: 40px 24px;
        max-width: 100%
      }

      .login-right {
        display: none
      }
    }

    @media(max-width:480px) {
      .login-left {
        padding: 28px 16px
      }

      .login-form-box {
        padding: 24px 20px
      }
    }

    /* Error banner */
    .auth-error {
      background: var(--danger-dim);
      border: 1.5px solid var(--danger);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--danger);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: popIn .2s ease;
    }

    /* ── DASHBOARD STATS ──────────────────────────────────────────────────────── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .12);
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, .22);
      border-color: var(--accent)
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 3px 3px 0 0
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1
    }

    .stat-label {
      font-size: 11px;
      color: var(--text2);
      font-weight: 600;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: .08em
    }

    .stat-icon {
      position: absolute;
      right: 18px;
      top: 18px;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: transform .2s ease
    }

    .stat-card:hover .stat-icon {
      transform: scale(1.1) rotate(-5deg)
    }

    /* ── SESSION ROW ──────────────────────────────────────────────────────────── */
    .session-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .2s ease;
    }

    .session-row:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, .2)
    }

    .session-row:active {
      transform: scale(.99) translateY(0)
    }

    .session-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      transition: transform .2s ease
    }

    .session-row:hover .session-icon {
      transform: scale(1.05)
    }

    /* ── MENU ITEM ────────────────────────────────────────────────────────────── */
    .menu-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all .2s ease
    }

    .menu-item:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15)
    }

    .menu-emoji {
      width: 48px;
      height: 48px;
      border-radius: 13px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      transition: transform .2s ease
    }

    .menu-item:hover .menu-emoji {
      transform: scale(1.08)
    }

    /* ── BILL PANEL ───────────────────────────────────────────────────────────── */
    .bill-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .15)
    }

    .bill-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border)
    }

    .bill-row {
      padding: 11px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background .15s ease
    }

    .bill-row:hover {
      background: var(--surface)
    }

    .bill-row:last-child {
      border-bottom: none
    }

    .bill-total {
      background: var(--accent);
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    /* ── TABS ─────────────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 24px
    }

    .tab {
      flex: 1;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      transition: all .2s ease;
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap
    }

    .tab.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .15)
    }

    .tab:hover:not(.active) {
      color: var(--text);
      background: var(--surface)
    }

    /* ── BADGES ───────────────────────────────────────────────────────────────── */
    .badge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      transition: all .2s ease
    }

    .badge-card.earned {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 4px 16px var(--accent-dim)
    }

    .badge-card:not(.earned) {
      opacity: .4
    }

    .badge-card.earned:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-dim)
    }

    .badge-emoji {
      font-size: 26px;
      margin-bottom: 8px
    }

    .badge-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text)
    }

    /* ── THEME PICKER ─────────────────────────────────────────────────────────── */
    .theme-card {
      border-radius: 16px;
      padding: 16px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all .2s ease;
      position: relative
    }

    .theme-card.active {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15)
    }

    .theme-card:hover {
      border-color: var(--border2);
      transform: translateY(-1px)
    }

    /* ── TOAST ────────────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      max-width: 320px
    }

    @media(max-width:768px) {
      #toast-container {
        top: auto;
        bottom: calc(var(--bnav-h) + 12px + env(safe-area-inset-bottom, 0px));
        right: 12px;
        left: 12px;
        max-width: none
      }
    }

    .toast {
      padding: 13px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .25);
      animation: fadeInUp .25s ease;
      pointer-events: auto;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px)
    }

    .toast-success {
      background: var(--surface);
      border: 1.5px solid var(--accent);
      color: var(--text)
    }

    .toast-error {
      background: var(--surface);
      border: 1.5px solid var(--danger);
      color: var(--text)
    }

    /* ── QTY STEPPER ──────────────────────────────────────────────────────────── */
    .qty-stepper {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s ease
    }

    .qty-stepper:hover {
      border-color: var(--border2)
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--text2);
      background: none;
      border: none;
      cursor: pointer;
      transition: all .15s ease;
      -webkit-tap-highlight-color: transparent
    }

    .qty-btn:hover {
      color: var(--accent);
      background: var(--accent-dim)
    }

    .qty-btn:active {
      transform: scale(.9)
    }

    .qty-num {
      width: 32px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      color: var(--text)
    }

    /* ── EMPTY STATE ──────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      border: 2px dashed var(--border);
      border-radius: 20px;
      transition: border-color .2s ease
    }

    .empty-state:hover {
      border-color: var(--border2)
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 10px;
      opacity: .4
    }

    .empty-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      font-style: italic
    }

    /* ── PROFILE HERO ─────────────────────────────────────────────────────────── */
    .profile-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .1);
      transition: box-shadow .2s ease
    }

    .profile-hero:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, .18)
    }

    /* ── SESSION LAYOUT ───────────────────────────────────────────────────────── */
    @media(min-width:1024px) {
      .session-layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 22px;
        align-items: start
      }
    }

    @media(max-width:1023px) {
      .session-layout {
        display: flex;
        flex-direction: column;
        gap: 20px
      }

      .session-layout>*:last-child {
        order: -1
      }

      /* Bill panel first on mobile */
    }

    /* ── SCROLLBAR ────────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text3)
    }

    /* ── INSTALL BANNER ───────────────────────────────────────────────────────── */
    #install-banner {
      display: none;
      background: var(--accent);
      color: #0a0a14;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 200;
      flex-wrap: wrap;
    }

    #install-banner.show {
      display: flex
    }

    #install-banner button {
      background: rgba(0, 0, 0, .15);
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-weight: 800;
      cursor: pointer;
      color: #0a0a14;
      font-size: 12px;
      white-space: nowrap
    }

    #install-banner .close-banner {
      background: none;
      margin-left: auto;
      font-size: 18px;
      line-height: 1;
      padding: 4px
    }

    #install-banner span {
      flex: 1
    }

    /* ── COLOR PICKER ─────────────────────────────────────────────────────────── */
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0
    }

    .color-swatch.active {
      border-color: var(--text);
      transform: scale(1.1)
    }

    /* ── JOIN CODE INPUT ──────────────────────────────────────────────────────── */
    .code-input {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 0 20px;
      height: 58px;
      font-size: 20px;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .12em;
      width: 100%;
      text-align: center;
      transition: all .2s ease;
      -webkit-appearance: none;
    }

    .code-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-dim);
      outline: none;
      background: var(--surface)
    }

    .code-input:hover:not(:focus) {
      border-color: var(--border2)
    }

    /* ── STATUS BANNERS ───────────────────────────────────────────────────────── */
    .status-banner {
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 14px
    }

    .status-banner-locked {
      background: var(--danger-dim);
      border: 1.5px solid var(--danger);
      color: var(--danger)
    }

    .status-banner-closed {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text2)
    }

    /* ── EMOJI PICKER ─────────────────────────────────────────────────────────── */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px
    }

    .emoji-btn {
      padding: 8px;
      border-radius: 10px;
      font-size: 16px;
      background: var(--surface2);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .15s ease;
      text-align: center;
      -webkit-tap-highlight-color: transparent
    }

    .emoji-btn.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: scale(1.08)
    }

    .emoji-btn:hover:not(.active) {
      border-color: var(--border2);
      transform: scale(1.04);
      background: var(--surface)
    }

    @media(max-width:480px) {
      .emoji-grid {
        grid-template-columns: repeat(6, 1fr)
      }
    }

    /* ── FORM SECTION ─────────────────────────────────────────────────────────── */
    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .08)
    }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
      display: block
    }
  </style>
</head>

  <div id="app"></div>
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script>
    // ── SUPABASE CONFIG ───────────────────────────────────────────────────────────
    // 👉 Replace these two values with your own from Supabase → Settings → API
    // ⚠️  RLS NOTE: If you have Row Level Security enabled on your Supabase tables,
    //     make sure to add policies that allow INSERT, UPDATE, SELECT, and DELETE
    //     for the anon role (or authenticated role if using Supabase Auth).
    //     Without RLS policies, all DB writes will silently fail.
    const SUPABASE_URL = 'https://ijomccrisaffrrlbonuk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlqb21jY3Jpc2FmZnJybGJvbnVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTI0NDcsImV4cCI6MjA5MDA2ODQ0N30.UGJj1gBn3bxMjxKuROW01Wb40oprpoaxjD_Y2Az1C7k';

    let _db = null;
    function getDB() {
      if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
        // Supabase not configured — using localStorage fallback
        return null;
      }
      if (!_db) {
        _db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: true, autoRefreshToken: true }
        });
      }
      return _db;
    }

    // ── DB HELPERS (Supabase-backed, falls back to localStorage if not configured) ─
    const DB = {
      async loadAll() {
        const db = getDB();
        if (!db) return false; // use localStorage fallback
        try {
          const [users, shops, sessions, orders] = await Promise.all([
            db.from('users').select('*'),
            db.from('shops').select('*'),
            db.from('sessions').select('*'),
            db.from('orders').select('*'),
          ]);
          state.users = (users.data || []).map(u => ({ id: u.id, username: u.username, password: u.password, role: u.role, joined: u.joined, avatarColor: u.avatar_color, bio: u.bio, theme: u.theme }));
          state.shops = (shops.data || []).map(s => ({ id: s.id, name: s.name, address: s.address, creatorId: s.creator_id, menu: s.menu || [] }));
          state.sessions = (sessions.data || []).map(s => ({ id: s.id, shopId: s.shop_id, creatorId: s.creator_id, location: s.location, locked: s.locked, closed: s.closed }));
          state.orders = (orders.data || []).map(o => ({ id: o.id, sessionId: o.session_id, userId: o.user_id, userName: o.user_name, itemId: o.item_id, itemName: o.item_name, price: o.price, quantity: o.quantity, note: o.note }));
          return true;
        } catch (e) { console.warn('Supabase load failed, using localStorage', e); return false; }
      },

      async upsertUser(u) {
        const db = getDB(); if (!db) return;
        try {
          const { error } = await db.from('users').upsert({ id: u.id, username: u.username, password: u.password, role: u.role, joined: u.joined, avatar_color: u.avatarColor, bio: u.bio || '', theme: u.theme || 'dark' });
          if (error) { console.error('upsertUser error:', error); toast('Failed to save user to DB', 'error'); }
        } catch (e) { console.error('upsertUser exception:', e); }
      },
      async upsertShop(s) {
        const db = getDB(); if (!db) return;
        try {
          const { error } = await db.from('shops').upsert({ id: s.id, name: s.name, address: s.address, creator_id: s.creatorId, menu: s.menu });
          if (error) { console.error('upsertShop error:', error); }
        } catch (e) { console.error('upsertShop exception:', e); }
      },
      async deleteShop(id) {
        const db = getDB(); if (!db) return;
        try {
          const { error } = await db.from('shops').delete().eq('id', id);
          if (error) { console.error('deleteShop error:', error); toast('Failed to delete from DB', 'error'); }
        } catch (e) { console.error('deleteShop exception:', e); }

        const db = getDB(); if (!db) return;

          const { error } = await db.from('sessions').upsert({ id: s.id, shop_id: s.shopId, creator_id: s.creatorId, location: s.location, locked: s.locked || false, closed: s.closed || false });
          if (error) { console.error('upsertSession error:', error); }
        } catch (e) { console.error('upsertSession exception:', e); }
      },

        const db = getDB(); if (!db) return;

          if (error) { console.error('upsertOrder error:', error); toast('Failed to save order to DB', 'error'); }
        } catch (e) { console.error('upsertOrder exception:', e); }

    function loadFromLocalStorage() {
      const g = (k, fb) => { try { return JSON.parse(localStorage.getItem(k) || fb) } catch { return JSON.parse(fb) } };
      state.shops = g(SK.SHOPS, '[]');
      state.sessions = g(SK.SESSIONS, '[]');
      state.orders = g(SK.ORDERS, '[]');
      state.users = g(SK.USERS, '[]');

    async function load() {
      try {
        const g = (k, fb) => { try { return JSON.parse(localStorage.getItem(k) || fb) } catch { return JSON.parse(fb) } };
        state.theme = localStorage.getItem(SK.THEME) || 'dark';
        const auth = g(SK.AUTH, 'null');
        if (auth) { state.user = auth; state.view = 'home'; }
        applyTheme(state.theme);
        render(); // render immediately with localStorage data
        const usedDB = await DB.loadAll();
        if (!usedDB) { loadFromLocalStorage(); }
        else { localStorage.setItem(SK.AUTH, JSON.stringify(state.user)); } // keep auth in localStorage
        render(); // re-render with DB data
      } catch (e) {
        console.error('Boot load failed', e);
        loadFromLocalStorage();
        render();
      }
    }
    function save() {
      // Always persist auth + theme locally; data synced to DB per-operation
      localStorage.setItem(SK.AUTH, JSON.stringify(state.user));
      localStorage.setItem(SK.THEME, state.theme);
      // localStorage mirror (offline fallback)
      localStorage.setItem(SK.SHOPS, JSON.stringify(state.shops));
      localStorage.setItem(SK.SESSIONS, JSON.stringify(state.sessions));
      localStorage.setItem(SK.ORDERS, JSON.stringify(state.orders));
      localStorage.setItem(SK.USERS, JSON.stringify(state.users));

    function applyTheme(name) {
      const t = THEMES[name] || THEMES.dark;
      document.documentElement.setAttribute('data-theme', name === 'dark' ? '' : name);
      const r = document.documentElement.style;
      Object.entries(t).forEach(([k, v]) => {
        if (!['name'].includes(k)) r.setProperty('--' + k, v);
      });
      // special: dark sets no data-theme attr since css default is dark
      if (name === 'dark') { document.documentElement.removeAttribute('data-theme'); }
      else { document.documentElement.setAttribute('data-theme', name); }
    }

      const c = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span>${msg}`;
      c.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300) }, 2500);
    }

    // ── AUTH ─────────────────────────────────────────────────────────────────────
    function handleAuth(username, password, isReg) {
      const u = username.trim().toLowerCase();
      const p = password;
      if (!u || !p) {
        state._authError = 'Please fill in all fields';
        save(); render(); return;
      }
      if (p.length < 3) {
        state._authError = 'Password must be at least 3 characters';
        save(); render(); return;
      }

      if (isReg) {
        if (state.users.find(x => x.username.toLowerCase() === u)) {
          state._authError = 'Username already taken — try another';
          save(); render(); return;
        }
        const nu = {
          id: gid(), username: u, password: p, role: state.users.length === 0 ? 'admin' : 'user',
          joined: new Date().toLocaleDateString(), avatarColor: AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)], bio: '', theme: 'dark'
        };
        state.users.push(nu); state.user = nu;
        DB.upsertUser(nu);
        toast('Account created! Welcome 🎉');
        setState({ view: 'home', _loginName: '', _loginPass: '', _showPass: false, _authError: null });
      } else {
        const found = state.users.find(x => x.username.toLowerCase() === u && x.password === p);
        if (!found) {
          state._authError = 'Invalid username or password';
          save(); render(); return;
        }
        state.user = found;
        const userTheme = found.theme || 'dark';
        toast(`Welcome back, ${found.username}!`);
        setState({ view: 'home', theme: userTheme, _loginName: '', _loginPass: '', _showPass: false, _authError: null });
        applyTheme(userTheme);
      }
    }

    // ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
    function exportShop(shop) {
      if (!shop) { toast('Shop not found', 'error'); return; }
      if (!shop.menu || shop.menu.length === 0) { toast('Menu is empty — nothing to export', 'error'); return; }
      const data = JSON.stringify({ name: shop.name, address: shop.address, menu: shop.menu.map(({ name, price, emoji }) => ({ name, price, emoji })) }, null, 2);
      // PRIMARY: copy to clipboard
      navigator.clipboard.writeText(data)
        .then(() => toast(`${shop.name} JSON copied to clipboard ✅`))
        .catch(() => toast('Failed to copy JSON', 'error'));
      // SECONDARY: also trigger file download
      try {
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `TeaRound_${shop.name.replace(/\s+/g, '_')}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      } catch (e) { console.warn('File download failed', e); }
    }

    function importShop(json) {
      try {
        const data = JSON.parse(json);
        if (!data.name || !Array.isArray(data.menu)) throw new Error();
        const s = { id: gid(), name: data.name, address: data.address || 'Imported', menu: data.menu.map(m => ({ ...m, id: gid() })), creatorId: state.user.id };
        state.shops.push(s); setState({ modal: null });
        toast(`Imported ${s.name}!`);
      } catch { toast('Invalid JSON format', 'error'); }
    }

    async function downloadSummary() {
      try {
        const session = getSession(), shop = getSessionShop(), so = getSessionOrders();
        if (!session) { toast('No active session', 'error'); return; }
        if (so.length === 0) { toast('No orders to export', 'error'); return; }
        // Try PNG capture first
        const node = document.getElementById('app');
        if (node && typeof htmlToImage !== 'undefined') {
          toast('Capturing screenshot…');
          try {
            const dataUrl = await htmlToImage.toPng(node, { quality: 1, pixelRatio: 2 });
            const link = document.createElement('a');
            link.download = `TeaRound_${state.activeSessionId}.png`;
            link.href = dataUrl;
            link.click();
            toast('Screenshot saved as PNG!');
            return;
          } catch (imgErr) { console.warn('Image capture failed, falling back to text', imgErr); }
        }
        // Fallback: text summary
        const agg = Object.entries(so.reduce((a, o) => { a[o.itemName] = (a[o.itemName] || 0) + o.quantity; return a }, {}));
        const total = so.reduce((a, o) => a + o.price * o.quantity, 0);
        let c = `TEA ROUND SUMMARY\nID: ${session?.id}\nShop: ${shop?.name}\nLocation: ${session?.location}\nDate: ${new Date().toLocaleString()}\n${'─'.repeat(32)}\n\nGROUP TOTALS:\n`;
        agg.forEach(([n, q]) => { c += `  • ${n}: ×${q}\n`; });
        c += `\nBILL: ₹${total}\n\nINDIVIDUAL ORDERS:\n`;
        so.forEach(o => { c += `  • ${o.userName}: ${o.itemName} ×${o.quantity} = ₹${o.price * o.quantity}\n`; });
        const blob = new Blob([c], { type: 'text/plain' });
        const url = URL.createObjectURL(blob); const a = document.createElement('a');
        a.href = url; a.download = `TeaRound_${state.activeSessionId}.txt`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        toast('Summary downloaded!');
      } catch (err) { console.error('Download failed', err); toast('Download failed', 'error'); }
    }

      </p>
      <div class="login-form-box">
        <div class="stack-12">
          <div>
            <label class="form-label">Username</label>
            <input id="auth-name" class="inp" placeholder="Enter your username" autocomplete="username"
              value="${(state._loginName || '').replace(/"/g, '&quot;')}"
              oninput="state._loginName=this.value"/>
          </div>
          <div>
            <label class="form-label">Password</label>
            <div style="position:relative">
              <input id="auth-pass" class="inp" type="${state._showPass ? 'text' : 'password'}"

                autocomplete="${isReg ? 'new-password' : 'current-password'}"
                value="${(state._loginPass || '').replace(/"/g, '&quot;')}"
                oninput="state._loginPass=this.value"
                style="padding-right:48px"/>
              <button type="button" onclick="togglePassVis()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text2);background:none;border:none;cursor:pointer;display:flex;padding:4px;border-radius:6px" tabindex="-1">
                ${svgIcon(state._showPass ? 'eye_off' : 'eye', 17)}

            </div>
          </div>
          ${state._authError ? `<div class="auth-error">${svgIcon('x', 14)} ${state._authError}</div>` : ''}
          <button class="btn btn-primary w-full" style="margin-top:4px;height:48px;font-size:15px" onclick="submitAuth(${isReg})">
            ${svgIcon('arrow_right', 18)} ${isReg ? 'Create Account' : 'Sign In'}
          </button>
          <button type="button" onclick="state._loginName=document.getElementById('auth-name')?.value||state._loginName||'';state._loginPass=document.getElementById('auth-pass')?.value||state._loginPass||'';setState({_loginReg:${!isReg},_authError:null})" style="color:var(--text2);font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;text-align:center;padding:8px">
            ${isReg ? 'Already have an account? Sign in →' : 'New here? Create an account →'}

        </div>
      </div>

    <div class="login-right">
      <div class="login-deco"></div>
      <div class="login-right-content">
        <div style="font-size:80px;margin-bottom:20px">☕</div>
        <div class="font-syne font-black text-accent" style="font-size:22px;margin-bottom:10px">Group Orders Made Easy</div>
        <p class="text-muted" style="font-size:14px;max-width:280px;margin:0 auto;line-height:1.6">
          Create rounds, share codes with colleagues, track orders and split bills — all in one place.
        </p>
        <div style="display:flex;gap:24px;justify-content:center;margin-top:36px">
          ${['☕ Track Orders', '🏪 Manage Shops', '💰 Split Bills'].map(f => `<div class="text-xs text-muted font-bold">${f}</div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
    }

    function submitAuth(isReg) {
      const name = document.getElementById('auth-name')?.value || '';
      const pass = document.getElementById('auth-pass')?.value || '';
      // Store values before any render that could reset inputs
      state._loginName = name; state._loginPass = pass;
      handleAuth(name, pass, isReg);
    }

    // Eye toggle: read live value first, update state, re-render keeps value via state
    function togglePassVis() {
      const pass = document.getElementById('auth-pass')?.value || '';
      state._loginPass = pass;
      state._showPass = !state._showPass;
      save(); render();
      // Restore caret to end after re-render
      requestAnimationFrame(() => {
        const el = document.getElementById('auth-pass');
        if (el) { el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
      });
    }

    function renderNav() {
      const v = state.view;
      const items = [
        { id: 'home', icon: 'home', label: 'Dashboard' },
        { id: 'manage-shops', icon: 'store', label: 'Shops' },
        { id: 'profile', icon: 'user', label: 'Profile' },
      ];
      return `
  <div id="sidebar">
    <div class="logo">
      <div class="logo-icon">☕</div>
      <div><div class="logo-text">TeaRound</div><div class="logo-sub">Pro Edition</div></div>
    </div>
    <nav>
      ${items.map(i => `
        <button class="nav-item ${v === i.id ? 'active' : ''}" onclick="setState({view:'${i.id}'})">
          ${svgIcon(i.icon, 18)} ${i.label}
        </button>
      `).join('')}
    </nav>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px">
        ${avatarHtml(state.user, 36, 10)}
        <div style="flex:1;min-width:0">
          <div class="font-bold truncate" style="font-size:13px;color:var(--text)">${state.user?.username || ''}</div>
          <div class="text-xs text-muted upper">${state.user?.role || 'user'}</div>
        </div>
        <button class="btn-icon" onclick="handleLogout()" title="Sign out">${svgIcon('logout', 16)}</button>
      </div>
    </div>
  </div>
  <nav id="bottom-nav">
    ${items.map(i => `
      <button class="bnav-item ${v === i.id ? 'active' : ''}" onclick="setState({view:'${i.id}'})">
        ${svgIcon(i.icon, 22)} <span>${i.label}</span>
      </button>
    `).join('')}
  </nav>`;
    }

    function handleLogout() {
      state.user = null;
      state._loginName = ''; state._loginPass = ''; state._showPass = false; state._authError = null;
      setState({ view: 'login' });
      toast('Signed out');
    }

    function renderTopbar(title, back = null) {
      return `<div id="topbar">
    <div class="flex gap-12">
      ${back ? `<button class="btn-icon" onclick="setState({view:'${back}'})">${svgIcon('chevron_left', 20)}</button>` : ''}
      <h1>${title}</h1>
    </div>
    <div class="flex gap-8">
      <button class="btn-icon" onclick="setState({modal:{type:'theme'}})" title="Theme">${svgIcon('palette', 16)}</button>
      ${avatarHtml(state.user, 36, 10)}
    </div>
  </div>`;
    }

    // ── HOME ─────────────────────────────────────────────────────────────────────
    function renderHome() {
      const activeSessions = state.sessions.filter(s => !s.closed);
      const closedSessions = state.sessions.filter(s => s.closed);
      const totalOrders = state.orders.filter(o => o.userId === state.user?.id).length;
      const hosted = state.sessions.filter(s => s.creatorId === state.user?.id).length;
      const spent = state.orders.filter(o => o.userId === state.user?.id).reduce((a, o) => a + o.price * o.quantity, 0);

      return `
  ${renderTopbar('Dashboard')}
  <div id="content">
    <!-- Stats -->
    <div class="grid-3" style="margin-bottom:28px">
      <div class="stat-card">
        <div class="stat-icon">${svgIcon('coffee', 20)}</div>
        <div class="stat-num">${totalOrders}</div>
        <div class="stat-label">Orders placed</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">${svgIcon('zap', 20)}</div>
        <div class="stat-num">${hosted}</div>
        <div class="stat-label">Rounds hosted</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">${svgIcon('trending_up', 20)}</div>
        <div class="stat-num">₹${spent}</div>
        <div class="stat-label">Total spent</div>
      </div>
    </div>

    <!-- Join code -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:24px;margin-bottom:28px">
      <div class="flex gap-8" style="margin-bottom:14px">
        ${svgIcon('zap', 16, 'style="color:var(--accent)"')}
        <span class="text-xs upper font-bold text-accent">Quick Join</span>
      </div>
      <div class="flex gap-8">
        <input id="join-code" class="code-input" placeholder="ROUND-XXXXXX" style="flex:1;text-align:left;font-size:16px;letter-spacing:.1em"/>
        <button class="btn btn-primary" style="white-space:nowrap" onclick="quickJoin()">
          ${svgIcon('arrow_right', 18)} Join
        </button>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="grid-2" style="margin-bottom:28px">
      <button class="quick-card" onclick="setState({view:'create-session'})">
        <div class="quick-card-icon" style="background:var(--accent-dim);color:var(--accent)">${svgIcon('plus', 22)}</div>
        <div class="font-syne font-black" style="font-size:15px;color:var(--text);margin-bottom:4px">New Round</div>
        <div class="text-xs text-muted">Start a group order</div>
      </button>
      <button class="quick-card" onclick="setState({view:'manage-shops'})">
        <div class="quick-card-icon" style="background:var(--surface2);color:var(--text2)">${svgIcon('store', 22)}</div>
        <div class="font-syne font-black" style="font-size:15px;color:var(--text);margin-bottom:4px">Manage Shops</div>
        <div class="text-xs text-muted">Add outlets &amp; menus</div>
      </button>
    </div>

    <!-- Active sessions -->
    <div class="section-title">Active Rounds</div>
    <div class="section-sub">${activeSessions.length} ongoing round${activeSessions.length !== 1 ? 's' : ''}</div>
    <div class="stack-8" style="margin-bottom:28px">
      ${activeSessions.length === 0 ? `<div class="empty-state"><div class="empty-icon">☕</div><div class="empty-text">No active rounds. Start one!</div></div>`
          : activeSessions.slice().reverse().map(s => {
            const shop = state.shops.find(sh => sh.id === s.shopId);
            const cnt = state.orders.filter(o => o.sessionId === s.id).length;
            const total = state.orders.filter(o => o.sessionId === s.id).reduce((a, o) => a + o.price * o.quantity, 0);
            return `<div class="session-row" onclick="goToSession('${s.id}')">
          <div class="session-icon">☕</div>
          <div style="flex:1;min-width:0">
            <div class="flex gap-8" style="margin-bottom:3px">
              <span class="tag tag-green">${s.id}</span>
              ${s.locked ? `<span class="tag tag-red">${svgIcon('lock', 11)} Locked</span>` : ''}
            </div>
            <div class="font-bold truncate" style="font-size:15px;color:var(--text)">${shop?.name || 'Deleted Shop'}</div>
            <div class="text-xs text-muted">${cnt} order${cnt !== 1 ? 's' : ''} · ${s.location || '—'}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="font-black text-accent" style="font-size:16px">₹${total}</div>
            ${svgIcon('chevron_right', 16, 'style="color:var(--text3)"')}
          </div>
        </div>`;
          }).join('')}
    </div>

    <!-- History -->
    ${closedSessions.length > 0 ? `
    <div class="section-title">History</div>
    <div class="section-sub">Completed rounds</div>
    <div class="stack-8">
      ${closedSessions.slice().reverse().slice(0, 5).map(s => {
            const shop = state.shops.find(sh => sh.id === s.shopId);
            const total = state.orders.filter(o => o.sessionId === s.id).reduce((a, o) => a + o.price * o.quantity, 0);
            return `<div class="session-row" style="opacity:.65" onclick="goToSession('${s.id}')">
          <div class="session-icon" style="background:var(--surface2)">${svgIcon('clock', 20, 'style="color:var(--text3)"')}</div>
          <div style="flex:1;min-width:0">
            <div class="tag tag-muted" style="margin-bottom:3px">${s.id} · Closed</div>
            <div class="font-bold truncate" style="color:var(--text)">${shop?.name || '—'}</div>
          </div>
          <div class="font-black" style="color:var(--text2)">₹${total}</div>
        </div>`;
          }).join('')}
    </div>`: ''}
  </div>`;
    }

    function quickJoin() {
      const code = (document.getElementById('join-code')?.value || '').trim().toUpperCase();
      if (!code) { toast('Enter a round code', 'error'); return; }
      const s = state.sessions.find(s => s.id === code || (s.joinCode && s.joinCode.trim().toUpperCase() === code));
      if (s) { goToSession(s.id); } else { toast('Invalid code — round not found', 'error'); }
    }
    function goToSession(id) { setState({ activeSessionId: id, view: 'session' }); }

    // ── SHOPS ─────────────────────────────────────────────────────────────────────
    function renderShops() {
      return `
  ${renderTopbar('Shops')}
  <div id="content">
    <div class="flex-between" style="margin-bottom:20px">
      <div><div class="section-title">Outlets</div><div class="section-sub">${state.shops.length} shop${state.shops.length !== 1 ? 's' : ''} configured</div></div>
      <button class="btn btn-dark" onclick="setState({modal:{type:'import'}})">
        ${svgIcon('upload', 16)} Import
      </button>
    </div>

    <div class="form-section" style="margin-bottom:24px">
      <div class="font-bold" style="margin-bottom:14px;color:var(--text2);font-size:12px;text-transform:uppercase;letter-spacing:.08em">Add New Outlet</div>
      <div class="stack-8">
        <div>
          <label class="form-label">Shop Name</label>
          <input id="shop-name" class="inp" placeholder="e.g. Chai Corner"/>
        </div>
        <div>
          <label class="form-label">Address / Location</label>
          <input id="shop-addr" class="inp" placeholder="e.g. 3rd Floor Pantry"/>
        </div>
        <button class="btn btn-primary w-full" style="margin-top:4px" onclick="createShop()">
          ${svgIcon('plus', 18)} Create Outlet
        </button>
      </div>
    </div>

    <div class="stack-8">
      ${state.shops.length === 0 ? `<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-text">No outlets yet. Add one above or import a config.</div></div>`
          : state.shops.map(s => `
        <div class="card" style="padding:18px 20px;display:flex;align-items:center;gap:14px">
          <div style="width:48px;height:48px;background:var(--accent-dim);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🏪</div>
          <div style="flex:1;min-width:0;cursor:pointer" onclick="setState({activeShopId:'${s.id}',view:'edit-menu'})">
            <div class="font-bold" style="font-size:15px;color:var(--text)">${s.name}</div>
            <div class="text-xs text-muted">${s.address} · ${s.menu?.length || 0} items</div>
          </div>
          <div class="flex gap-8">
            <button class="btn-icon" onclick="exportShop(state.shops.find(sh=>sh.id==='${s.id}'))" title="Export">${svgIcon('download', 16)}</button>
            <button class="btn-icon" style="color:var(--danger)" onclick="confirmDelete('Remove &quot;${s.name}&quot;?',async()=>{try{await DB.deleteShop('${s.id}');state.shops=state.shops.filter(sh=>sh.id!=='${s.id}');setState({});toast('Shop deleted');}catch(e){console.error(e);toast('Delete failed','error');}})" title="Delete">${svgIcon('trash', 16)}</button>
          </div>
        </div>
      `).join('')}
    </div>
  </div>`;
    }

    function createShop() {
      try {
        const name = document.getElementById('shop-name')?.value?.trim();
        const addr = document.getElementById('shop-addr')?.value?.trim();
        if (!name || !addr) { toast('Fill both fields', 'error'); return; }
        const shop = { id: gid(), name, address: addr, menu: [], creatorId: state.user.id };
        state.shops.push(shop);
        DB.upsertShop(shop);
        setState({}); toast('Outlet created! 🏪');
      } catch (e) { console.error('createShop failed', e); toast('Failed to create shop', 'error'); }
    }

    // ── EDIT MENU ─────────────────────────────────────────────────────────────────
    function renderEditMenu() {
      const shop = state.shops.find(s => s.id === state.activeShopId);
      if (!shop) return renderShops();
      const selEmoji = state._menuEmoji || '🍵';
      return `
  ${renderTopbar(`Edit: ${shop.name}`, 'manage-shops')}
  <div id="content">
    <div class="card" style="padding:22px;margin-bottom:22px">
      <div class="font-bold" style="margin-bottom:14px;color:var(--text2);font-size:12px;text-transform:uppercase;letter-spacing:.08em">Add Menu Item</div>
      <div style="display:flex;gap:14px;margin-bottom:14px;align-items:flex-start">
        <div style="width:72px;height:72px;background:var(--surface2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;border:1px solid var(--border)">${selEmoji}</div>
        <div class="stack-8" style="flex:1">
          <input id="item-name" class="inp" placeholder="Item name"/>
          <input id="item-price" class="inp" type="number" placeholder="Price ₹" min="0"/>
        </div>
      </div>
      <div class="emoji-grid" style="margin-bottom:14px">
        ${FOOD_EMOJIS.map(em => `<button class="emoji-btn ${em === selEmoji ? 'active' : ''}" onclick="setState({_menuEmoji:'${em}'})">${em}</button>`).join('')}
      </div>
      <button class="btn btn-primary w-full" onclick="addMenuItem('${shop.id}')">
        ${svgIcon('plus', 18)} Add Item
      </button>
    </div>

    <div class="section-title" style="margin-bottom:12px">Menu (${shop.menu.length} items)</div>
    <div class="stack-8">
      ${shop.menu.length === 0 ? `<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">No items yet. Add some above.</div></div>`
          : shop.menu.map(item => `
        <div class="menu-item">
          <div class="menu-emoji">${item.emoji}</div>
          <div style="flex:1">
            <div class="font-bold" style="color:var(--text)">${item.name}</div>
            <div class="text-accent font-bold text-sm">₹${item.price}</div>
          </div>
          <button class="btn-icon" style="color:var(--danger)" onclick="removeMenuItem('${shop.id}','${item.id}')">${svgIcon('trash', 16)}</button>
        </div>
      `).join('')}
    </div>
  </div>`;
    }

    function addMenuItem(shopId) {
      try {
        const name = document.getElementById('item-name')?.value?.trim();
        const price = document.getElementById('item-price')?.value;
        if (!name) { toast('Enter item name', 'error'); return; }
        const emoji = state._menuEmoji || '🍵';
        state.shops = state.shops.map(s => s.id === shopId ? { ...s, menu: [...s.menu, { id: gid(), name, price: parseFloat(price) || 0, emoji }] } : s);
        const updatedShop = state.shops.find(s => s.id === shopId);
        DB.upsertShop(updatedShop);
        setState({ _menuEmoji: emoji }); toast('Item added!');
      } catch (e) { console.error('addMenuItem failed', e); toast('Failed to add item', 'error'); }
    }
    function removeMenuItem(shopId, itemId) {
      try {
        state.shops = state.shops.map(s => s.id === shopId ? { ...s, menu: s.menu.filter(m => m.id !== itemId) } : s);
        const updatedShop = state.shops.find(s => s.id === shopId);
        DB.upsertShop(updatedShop);
        setState({}); toast('Item removed');
      } catch (e) { console.error('removeMenuItem failed', e); toast('Failed to remove item', 'error'); }
    }

    // ── CREATE SESSION ────────────────────────────────────────────────────────────
    function renderCreateSession() {
      const selShop = state._newSessionShop || '';
      const shop = state.shops.find(s => s.id === selShop);
      return `
  ${renderTopbar('New Round', 'home')}
  <div id="content">
    <div class="card" style="padding:28px;max-width:560px">
      <div class="font-syne font-black" style="font-size:22px;color:var(--text);margin-bottom:6px">Configure Round</div>
      <div class="text-muted text-sm" style="margin-bottom:28px">Set up a group order for your team</div>

      <div style="margin-bottom:18px">
        <label class="text-xs upper font-bold text-muted" style="display:block;margin-bottom:8px">Select Outlet</label>
        <select class="inp" id="session-shop" onchange="setState({_newSessionShop:this.value,_newSessionLoc:state.shops.find(s=>s.id===this.value)?.address||''})" style="appearance:none">
          <option value="">Choose a shop…</option>
          ${state.shops.map(s => `<option value="${s.id}" ${selShop === s.id ? 'selected' : ''}>${s.name} — ${s.address}</option>`).join('')}
        </select>
        ${state.shops.length === 0 ? `<div class="text-xs" style="color:var(--danger);margin-top:6px">No shops yet. <button onclick="setState({view:'manage-shops'})" style="background:none;border:none;color:var(--accent);cursor:pointer;font-weight:700">Create one first →</button></div>` : ''}
      </div>

      <div style="margin-bottom:28px">
        <label class="text-xs upper font-bold text-muted" style="display:block;margin-bottom:8px">Delivery Location</label>
        <input id="session-loc" class="inp" placeholder="Where to deliver?" value="${state._newSessionLoc || ''}"/>
      </div>

      <button class="btn btn-primary w-full" style="padding:14px;font-size:15px" onclick="createSession()" ${!selShop ? 'disabled' : ''}>
        ${svgIcon('zap', 18)} Start Round
      </button>
    </div>
  </div>`;
    }

    function createSession() {
      try {
        const shopId = document.getElementById('session-shop')?.value;
        const loc = document.getElementById('session-loc')?.value?.trim() || 'Office';
        if (!shopId) { toast('Select a shop', 'error'); return; }
        const id = `ROUND-${gid()}`.toUpperCase();
        const session = { id, joinCode: id, shopId, location: loc, creatorId: state.user.id, createdAt: new Date().toISOString(), locked: false, closed: false };
        state.sessions.push(session);
        DB.upsertSession(session);
        setState({ activeSessionId: id, view: 'session', _newSessionShop: '', _newSessionLoc: '' });
        toast('Round started! Share the code with your team 🚀');
      } catch (e) { console.error('createSession failed', e); toast('Failed to create round', 'error'); }
    }

    // ── SESSION ───────────────────────────────────────────────────────────────────
    function renderSession() {
      const session = getSession();
      const shop = getSessionShop();
      const so = getSessionOrders();
      if (!session) return renderHome();

      const isCreator = session.creatorId === state.user?.id || state.user?.role === 'admin';
      const total = so.reduce((a, o) => a + o.price * o.quantity, 0);
      const agg = Object.entries(so.reduce((a, o) => { a[o.itemName] = (a[o.itemName] || 0) + o.quantity; return a }, {}));
      const uniqueUsers = [...new Set(so.map(o => o.userId))];
      const perPerson = uniqueUsers.length ? Math.ceil(total / uniqueUsers.length) : 0;
      const qty = state._orderQty || {};

      const billPanel = `
    <div class="bill-panel">
      <div class="bill-header">
        <div class="flex-between">
          <div class="font-syne font-black" style="font-size:16px;color:var(--text)">Group Totals</div>
          <span class="tag tag-green">${so.length} item${so.length !== 1 ? 's' : ''}</span>
        </div>
      </div>
      ${agg.length === 0 ? `<div class="bill-row"><span class="text-muted" style="font-style:italic;font-size:13px">Waiting for orders…</span></div>`
          : agg.map(([name, count]) => `
        <div class="bill-row">
          <span class="font-bold" style="font-size:14px;color:var(--text)">${name}</span>
          <span class="font-black text-accent">×${count}</span>
        </div>
      `).join('')}
      <div class="bill-total">
        <div>
          <div style="font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.08em;color:#0a0a14">Bill Estimate</div>
